<script>
let allData = [];
let catalogProducts = [];
let allClients = [];
let currentEncItems = []; 

const MP_ACCESS_TOKEN = 'APP_USR-7398589288908992-032715-7dd4cc5f51a2968edb29e1a6a55947d2-2908485918';
const CHAVE_PIX_ALEATORIA = '7fdc442f-35de-46f2-9190-530344229f25';

function toast(text, bg = "#e11d48") { Toastify({ text, duration: 3000, style: { background: bg, fontWeight: 'bold', borderRadius: '12px' } }).showToast(); }
function formatMoney(val) { return Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
function formatPhone(v) {
    v = v.replace(/\D/g, '').slice(0, 11);
    if (v.length <= 2) return `(${v}`;
    if (v.length <= 7) return `(${v.slice(0,2)}) ${v.slice(2)}`;
    return `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
}
function parseMoney(val) {
    if (!val) return 0;
    let clean = String(val).replace('R$', '').replace(/\./g, '').replace(',', '.').trim();
    return parseFloat(clean) || 0;
}
function formatInputMoney(el) { el.value = parseMoney(el.value).toFixed(2).replace('.', ','); }
function formatDateBr(isoString) {
    if (!isoString) return 'Data não definida';
    const d = new Date(isoString);
    return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function normalizeStr(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : ""; }

function switchTab(tabId) {
    ['encomendas', 'producao'].forEach(id => {
        document.getElementById(`tab-${id}`).style.display = 'none';
        document.getElementById(`btn-tab-${id}`).classList.remove('active', 'text-rose-600', 'bg-rose-50', 'border-b-2', 'border-rose-500');
    });
    document.getElementById(`tab-${tabId}`).style.display = 'block';
    document.getElementById(`btn-tab-${tabId}`).classList.add('active', 'text-rose-600', 'bg-rose-50', 'border-b-2', 'border-rose-500');
    if (tabId === 'producao') renderProducao();
}

async function loadData() {
    try {
        const { data, error } = await supabaseClient.from('pedidos').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        allData = data;
        renderEncomendas();
    } catch (err) { toast("Erro ao carregar dados", "#ef4444"); }
}

async function loadCatalogAndClients() {
    try {
        const resCat = await supabaseClient.from('produtos').select('*').eq('disponivel', 'Sim');
        if (resCat.data) catalogProducts = resCat.data;
        const resCli = await supabaseClient.from('clientes').select('*');
        if (resCli.data) allClients = resCli.data;
    } catch(e) { console.error("Erro dicionários:", e); }
}

function renderEncomendas() {
    const grid = document.getElementById('grid-encomendas');
    const empty = document.getElementById('empty-encomendas');
    
    const encomendas = allData.filter(o => {
        const s = o.status.toLowerCase();
        return !s.includes('cancelad') && !s.includes('concluí') && (o.tipo === 'Encomenda' || o.data_entrega);
    });

    let totEnc = 0, totSinal = 0;
    encomendas.forEach(p => { totEnc += parseMoney(p.total); totSinal += parseMoney(p.sinal_pago); });
    
    document.getElementById('agenda-total-val').innerText = formatMoney(totEnc);
    document.getElementById('agenda-sinal-val').innerText = formatMoney(totSinal);
    document.getElementById('agenda-saldo-val').innerText = formatMoney(totEnc - totSinal);
    document.getElementById('enc-count').innerText = `${encomendas.length} agendadas`;

    if (encomendas.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    
    grid.innerHTML = encomendas.sort((a,b)=>new Date(a.data_entrega)-new Date(b.data_entrega)).map(o => {
        const total = parseMoney(o.total);
        const sinal = parseMoney(o.sinal_pago);
        const saldo = total - sinal;
        
        let statusColor = "bg-slate-100 text-slate-700";
        if (o.status === "Pronto") statusColor = "bg-emerald-100 text-emerald-700";
        if (o.status === "Conta do Cliente") statusColor = "bg-amber-100 text-amber-700 font-black";
        if (o.status === "Aguardando Sinal") statusColor = "bg-rose-100 text-rose-700";

        return `
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex flex-col relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1.5 h-full bg-rose-500"></div>
            <div class="pl-2 flex flex-col h-full">
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-rose-50 text-rose-700 px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-1.5 border border-rose-100">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${formatDateBr(o.data_entrega)}
                    </div>
                    <span class="text-[10px] font-bold px-2 py-1 rounded-md ${statusColor}">${o.status}</span>
                </div>
                <h4 class="font-bold text-slate-800 text-lg mb-1 truncate">${o.cliente}</h4>
                <div class="text-xs text-slate-500 font-mono bg-slate-50 p-2 rounded-xl border mb-4 line-clamp-2">
                    ${(o.itens || '').replace(/\|/g, '\n')}
                </div>
                <div class="mt-auto pt-4 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black uppercase text-slate-400">Total Pedido</span>
                        <span class="text-sm font-bold text-slate-700">${formatMoney(total)}</span>
                    </div>
                    <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-200">
                        <span class="text-[10px] font-black uppercase text-slate-400">Falta Pagar</span>
                        <span class="text-lg font-black text-rose-600">${formatMoney(saldo)}</span>
                    </div>
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="cobrarWhatsApp('${o.id}')" class="p-2.5 bg-[#25D366] text-white rounded-xl shadow-sm"><i data-lucide="message-circle" class="w-4 h-4"></i></button>
                    <button onclick="printEncomenda('${o.id}')" class="p-2.5 bg-slate-100 text-slate-600 rounded-xl shadow-sm"><i data-lucide="printer" class="w-4 h-4"></i></button>
                    <button onclick="editEncomenda('${o.id}')" class="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold">Editar</button>
                    <button onclick="enviarParaCaixa('${o.id}')" class="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-xs font-bold">Pagar</button>
                </div>
            </div>
        </div>`;
    }).join('');
    lucide.createIcons();
}

async function enviarParaCaixa(id) {
    if(!confirm("Deseja enviar para finalização no Caixa?")) return;
    const { error } = await supabaseClient.from('pedidos').update({ status: 'Pendente' }).eq('id', id);
    if (!error) { toast("Enviado ao Caixa!", "#10b981"); loadData(); }
}

async function cobrarWhatsApp(id) {
    const o = allData.find(x => x.id == id);
    const totalPedido = parseMoney(o.total);
    const sinalPago = parseMoney(o.sinal_pago);
    const taxaEntrega = parseMoney(o.taxa_entrega || '0');
    const desconto = parseMoney(o.desconto_total || '0');
    const saldo = totalPedido - sinalPago;
    
    let linkPagamento = '';
    if (saldo > 0.5) {
        try {
            const response = await fetch('https://api.mercadopago.com/checkout/preferences', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${MP_ACCESS_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    items: [{ title: `Acerto Encomenda Morangos Tatuí`, quantity: 1, currency_id: 'BRL', unit_price: Number(saldo.toFixed(2)) }],
                    payment_methods: { excluded_payment_types: [{ id: "ticket" }] }
                })
            });
            const data = await response.json();
            if (data.init_point) linkPagamento = data.init_point;
        } catch (e) { linkPagamento = CHAVE_PIX_ALEATORIA; }
    }

    const nome = o.cliente.split('(')[0].trim();
    let text = `Olá, *${nome}*! Tudo bem? Aqui é da *Morangos Tatuí* 🍓.\n\n`;
    text += `Passando para confirmar o agendamento da sua encomenda para o dia: *${formatDateBr(o.data_entrega)}*.\n\n`;
    
    text += `*Resumo da Encomenda:*\n`;
    text += `${o.itens.replace(/\|/g, '\n')}\n`;
    if(taxaEntrega > 0) text += `🛵 Entrega: ${formatMoney(taxaEntrega)}\n`;
    if(desconto > 0) text += `🎁 Desconto: -${formatMoney(desconto)}\n`;
    text += `--------------------------\n`;
    text += `💰 Total do Pedido: *${formatMoney(totalPedido)}*\n`;
    text += `✅ Sinal Já Pago: ${formatMoney(sinalPago)}\n`;
    text += `🚩 *Saldo Restante: ${formatMoney(saldo)}*\n\n`;

    if(saldo > 0.1) {
        if (linkPagamento.startsWith('http')) {
            text += `Para facilitar, você pode pagar o saldo com Cartão ou Pix aqui:\n👉 ${linkPagamento}\n\n`;
        } else {
            text += `Para adiantar via Pix (Copia e Cola):\n\`${linkPagamento}\`\n\n`;
        }
    }
    
    text += `Qualquer dúvida, estamos à disposição! 🥰`;

    let phoneMatch = o.cliente.match(/\(?(\d{2})\)?\s*(\d{4,5})-?(\d{4})/);
    let waLink = "https://wa.me/" + (phoneMatch ? "55" + phoneMatch[1] + phoneMatch[2] + phoneMatch[3] : "") + "?text=" + encodeURIComponent(text);
    window.open(waLink, '_blank');
}

function printEncomenda(id) {
    const o = allData.find(x => x.id == id);
    const win = window.open('', '', 'width=450,height=600');
    const totalItens = parseMoney(o.total) - parseMoney(o.taxa_entrega || '0') + parseMoney(o.desconto_total || '0');
    
    win.document.write(`<html><head><title>Comanda</title><style>
        body{font-family:'Courier New',monospace;width:300px;margin:0 auto;padding:10px;font-weight:bold}
        .header{text-align:center;margin-bottom:10px}
        .divider{border-top:2px dashed #000;margin:10px 0}
        .client{font-size:24px;text-transform:uppercase;margin:10px 0}
        .item-list{font-size:18px;margin-bottom:10px}
        .financeiro{text-align:right; font-size:14px}
        .falta{font-size:22px;margin-top:5px;border:1px solid #000;padding:5px;display:inline-block}
    </style></head><body>
        <div class="header"><h2>MORANGOS TATUÍ</h2><p>ENCOMENDA #${String(id).slice(-4)}</p></div>
        <div class="divider"></div>
        <div>ENTREGA: ${formatDateBr(o.data_entrega)}</div>
        <div class="client">${o.cliente}</div>
        <div class="divider"></div>
        <div class="item-list">${(o.itens||'').replace(/\|/g, '<br>')}</div>
        ${o.obs ? `<div class="divider"></div><div>OBS: ${o.obs}</div>` : ''}
        <div class="divider"></div>
        <div class="financeiro">
            ITENS: ${formatMoney(totalItens)}<br>
            ENTREGA: ${formatMoney(parseMoney(o.taxa_entrega || '0'))}<br>
            DESCONTO: -${formatMoney(parseMoney(o.desconto_total || '0'))}<br>
            TOTAL: ${o.total}<br>
            SINAL: ${o.sinal_pago}<br>
            <div class="falta">FALTA: ${formatMoney(parseMoney(o.total)-parseMoney(o.sinal_pago))}</div>
        </div>
        ${o.status === "Conta do Cliente" ? '<br><center>*** CONTA DO CLIENTE ***</center>' : ''}
    </body></html>`);
    win.document.close();
    setTimeout(() => { win.focus(); win.print(); win.close(); }, 300);
}

// PRODUÇÃO
function renderProducao() {
    const list = document.getElementById('lista-producao');
    const pendentes = allData.filter(o => {
        const s = o.status.toLowerCase();
        return !s.includes('cancelad') && !s.includes('concluí') && !s.includes('pronto');
    });
    let prod = {};
    pendentes.forEach(p => {
        if (!p.itens) return;
        p.itens.split('|').forEach(str => {
            const match = str.trim().match(/^(\d+)x\s+(.+?)(?:\s+\[R\$.+\]|$)/);
            if (match) {
                const q = parseInt(match[1]), n = match[2].trim();
                prod[n] = (prod[n] || 0) + q;
            }
        });
    });
    list.innerHTML = Object.keys(prod).map(n => `
        <div class="flex items-center justify-between bg-slate-50 border p-4 rounded-xl">
            <div class="flex items-center gap-4">
                <div class="bg-white border w-12 h-12 rounded-lg flex items-center justify-center font-black text-rose-600 text-xl">${prod[n]}x</div>
                <h4 class="font-bold text-slate-800">${n}</h4>
            </div>
            <input type="checkbox" class="w-6 h-6 rounded cursor-pointer">
        </div>
    `).join('') || '<p class="text-center py-10 text-slate-400">Nada para produzir no momento.</p>';
}

// LÓGICA DO MODAL
function recalcModalTotal() {
    let subtotal = 0;
    currentEncItems.forEach(i => subtotal += i.total);
    const entrega = parseMoney(document.getElementById('enc-entrega').value);
    const desc = parseMoney(document.getElementById('enc-desconto').value);
    const final = (subtotal + entrega) - desc;
    document.getElementById('enc-total').value = final.toFixed(2).replace('.', ',');
}

function renderEncItems() {
    const container = document.getElementById('enc-items-visual-list');
    container.innerHTML = currentEncItems.map(item => `
        <div class="flex justify-between items-center bg-white border p-2 rounded-xl mb-2">
            <div class="flex items-center gap-3">
                <div class="flex items-center bg-slate-50 rounded-lg border">
                    <button onclick="changeItemQty('${item.id}', -1)" class="w-7 h-7 font-bold">-</button>
                    <span class="text-xs font-black w-5 text-center">${item.qty}</span>
                    <button onclick="changeItemQty('${item.id}', 1)" class="w-7 h-7 font-bold">+</button>
                </div>
                <span class="text-sm font-bold text-slate-700 truncate max-w-[150px]">${item.name}</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm font-black text-rose-600">${formatMoney(item.total)}</span>
                <button onclick="removeItemEnc('${item.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
        </div>
    `).join('') || '<div class="text-center py-6 text-slate-400 text-xs font-bold">Nenhum item adicionado.</div>';
    lucide.createIcons();
    recalcModalTotal();
}

function changeItemQty(id, delta) {
    const item = currentEncItems.find(i => i.id === id);
    if (item) {
        item.qty += delta;
        if (item.qty <= 0) currentEncItems = currentEncItems.filter(i => i.id !== id);
        else item.total = item.qty * item.unitPrice;
        renderEncItems();
    }
}

function removeItemEnc(id) { currentEncItems = currentEncItems.filter(i => i.id !== id); renderEncItems(); }

function addItemToEnc(nome, precoVal, variacao = null) {
    const nameEx = variacao ? `${nome} (${variacao})` : nome;
    const price = parseFloat(precoVal);
    const existing = currentEncItems.find(i => i.name === nameEx);
    if (existing) { existing.qty += 1; existing.total = existing.qty * existing.unitPrice; }
    else { currentEncItems.push({ id: Math.random().toString(36).substring(7), qty: 1, name: nameEx, unitPrice: price, total: price }); }
    renderEncItems();
    closeVariationSelector();
    document.getElementById('product-search').value = '';
}

function addAvulsoItem() {
    const nome = document.getElementById('avulso-nome').value.trim();
    const price = parseMoney(document.getElementById('avulso-preco').value);
    if (!nome) return;
    currentEncItems.push({ id: Math.random().toString(36).substring(7), qty: 1, name: nome, unitPrice: price, total: price });
    document.getElementById('avulso-nome').value = '';
    document.getElementById('avulso-preco').value = '';
    document.getElementById('form-avulso').classList.add('hidden');
    renderEncItems();
}

// CRUD CLIENTE E PRODUTOS
function searchClients(q) {
    const results = document.getElementById('client-results');
    document.getElementById('new-client-form').classList.add('hidden');
    if (q.length < 2) { results.classList.add('hidden'); return; }
    const matches = allClients.filter(c => normalizeStr(c.nome).includes(normalizeStr(q)) || normalizeStr(c.telefone).includes(normalizeStr(q))).slice(0, 5);
    results.innerHTML = matches.map(c => `<div onclick="selectClient('${c.nome}', '${c.telefone}')" class="p-3 hover:bg-slate-50 cursor-pointer border-b text-sm font-bold">${c.nome} - ${formatPhone(c.telefone)}</div>`).join('') + `<div onclick="showNewClientForm('${q}')" class="p-3 bg-rose-50 text-rose-600 font-bold text-sm cursor-pointer">+ Cadastrar "${q}"</div>`;
    results.classList.remove('hidden');
}
function selectClient(n, t) { document.getElementById('enc-cliente').value = `${n} (${formatPhone(t)})`; document.getElementById('client-results').classList.add('hidden'); }
function showNewClientForm(n) { document.getElementById('client-results').classList.add('hidden'); document.getElementById('new-client-form').classList.remove('hidden'); document.getElementById('nc-nome').value = n; }
async function saveNewClient() {
    const n = document.getElementById('nc-nome').value, t = document.getElementById('nc-tel').value.replace(/\D/g, '');
    if(!n || t.length<10) return toast("Preencha corretamente");
    const payload = { nome: n, telefone: t, cep: document.getElementById('nc-cep').value, rua: document.getElementById('nc-rua').value, pin_senha:'0000', saldo_cashback:0 };
    await supabaseClient.from('clientes').insert([payload]);
    allClients.push(payload); selectClient(n, t);
    document.getElementById('new-client-form').classList.add('hidden');
    toast("Cliente Salvo!");
}

function searchProducts(q) {
    const res = document.getElementById('product-results');
    if (q.length < 2) { res.classList.add('hidden'); return; }
    const matches = catalogProducts.filter(p => normalizeStr(p.nome).includes(normalizeStr(q))).slice(0, 8);
    res.innerHTML = matches.map(p => `<div onclick="showVariationOptions('${p.nome.replace(/'/g,"\\'")}', '${p.preco}')" class="p-3 hover:bg-blue-50 cursor-pointer border-b flex justify-between items-center text-sm font-bold"><span>${p.nome}</span><span class="text-[10px] bg-blue-100 px-2 rounded">OPÇÕES</span></div>`).join('');
    res.classList.remove('hidden');
}

function showVariationOptions(nome, precoStr) {
    document.getElementById('product-results').classList.add('hidden');
    const varSelector = document.getElementById('variation-selector');
    let html = `<div class="flex justify-between items-center mb-3 font-bold"><span>${nome}</span><button onclick="closeVariationSelector()">X</button></div>`;
    if (precoStr.includes('|')) {
        precoStr.split('|').forEach(p => {
            const [l, v] = p.split(':');
            const val = parseMoney(v);
            html += `<div onclick="addItemToEnc('${nome}','${val}','${l.trim()}')" class="p-2 border rounded mb-1 flex justify-between cursor-pointer hover:bg-blue-50"><span>${l}</span><b>${formatMoney(val)}</b></div>`;
        });
    } else {
        const val = parseMoney(precoStr);
        html += `<div onclick="addItemToEnc('${nome}','${val}',null)" class="p-3 border-2 border-emerald-500 rounded flex justify-between cursor-pointer hover:bg-emerald-50"><span>Adicionar</span><b>${formatMoney(val)}</b></div>`;
    }
    varSelector.innerHTML = html;
    varSelector.classList.remove('hidden');
}
function closeVariationSelector() { document.getElementById('variation-selector').classList.add('hidden'); }
function toggleAvulsoForm() { document.getElementById('form-avulso').classList.toggle('hidden'); }

// SALVAR ENCOMENDA
function openNovaEncomendaModal() {
    document.getElementById('enc-id').value = '';
    document.getElementById('enc-cliente').value = '';
    document.getElementById('enc-data').value = '';
    document.getElementById('enc-entrega').value = '0,00';
    document.getElementById('enc-desconto').value = '0,00';
    document.getElementById('enc-sinal').value = '0,00';
    document.getElementById('enc-obs').value = '';
    document.getElementById('enc-status').value = 'Agendado';
    currentEncItems = []; renderEncItems();
    document.getElementById('modal-encomenda').classList.remove('hidden');
}

function editEncomenda(id) {
    const order = allData.find(o => o.id == id);
    document.getElementById('enc-id').value = order.id;
    document.getElementById('enc-cliente').value = order.cliente;
    document.getElementById('enc-data').value = order.data_entrega ? order.data_entrega.slice(0, 16) : '';
    document.getElementById('enc-entrega').value = parseMoney(order.taxa_entrega).toFixed(2).replace('.', ',');
    document.getElementById('enc-desconto').value = parseMoney(order.desconto_total).toFixed(2).replace('.', ',');
    document.getElementById('enc-sinal').value = parseMoney(order.sinal_pago).toFixed(2).replace('.', ',');
    document.getElementById('enc-status').value = order.status;
    document.getElementById('enc-obs').value = order.obs || '';
    
    currentEncItems = [];
    if (order.itens) {
        order.itens.split('|').forEach(p => {
            const m = p.trim().match(/^(\d+)x\s+(.+?)\s+\[R\$\s*([\d\.,]+)\]$/);
            if (m) {
                const qty = parseInt(m[1]), tot = parseMoney(m[3]);
                currentEncItems.push({ id: Math.random().toString(36).substring(7), qty, name: m[2].trim(), unitPrice: tot / qty, total: tot });
            }
        });
    }
    renderEncItems();
    document.getElementById('modal-encomenda').classList.remove('hidden');
}

function closeModalEnc() { document.getElementById('modal-encomenda').classList.add('hidden'); }

async function saveEncomenda() {
    const btn = document.getElementById('btn-save-enc');
    btn.disabled = true;
    const itensFmt = currentEncItems.map(i => `${i.qty}x ${i.name} [${formatMoney(i.total)}]`).join(' | ');
    const payload = {
        cliente: document.getElementById('enc-cliente').value,
        data_entrega: document.getElementById('enc-data').value,
        itens: itensFmt,
        total: formatMoney(parseMoney(document.getElementById('enc-total').value)),
        taxa_entrega: formatMoney(parseMoney(document.getElementById('enc-entrega').value)),
        desconto_total: formatMoney(parseMoney(document.getElementById('enc-desconto').value)),
        sinal_pago: formatMoney(parseMoney(document.getElementById('enc-sinal').value)),
        status: document.getElementById('enc-status').value,
        obs: document.getElementById('enc-obs').value,
        tipo: 'Encomenda', pagamento: 'A Pagar', status_pagamento: 'Pendente'
    };
    const id = document.getElementById('enc-id').value;
    const { error } = id ? await supabaseClient.from('pedidos').update(payload).eq('id', id) : await supabaseClient.from('pedidos').insert([{...payload, id: Date.now().toString().slice(-6), data: new Date().toLocaleString("pt-BR")}]);
    if (!error) { toast("Salvo!"); closeModalEnc(); loadData(); }
    btn.disabled = false;
}

loadCatalogAndClients().then(() => loadData());
lucide.createIcons();
</script>
