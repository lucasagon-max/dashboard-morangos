<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morangos Tatuí · Financeiro</title>
<link rel="icon" type="image/jpeg" href="https://ferramentas.morangostatui.com.br/favicon.jpg">
<link rel="apple-touch-icon" href="https://ferramentas.morangostatui.com.br/favicon.jpg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['"DM Sans"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] },
        colors: { brand: { 50: '#fff1f2', 100: '#ffe4e6', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c' } }
      }
    }
  }
</script>

<style>
  body { background-color: #f8fafc; color: #0f172a; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .tab-btn { position: relative; }
  .tab-btn.active { color: #e11d48; font-weight: 600; }
  .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: #e11d48; border-radius: 2px 2px 0 0; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 12px 12px 0 0; }
  .kpi-brand::before { background-color: #e11d48; }
  .kpi-green::before { background-color: #10b981; }
  .kpi-dark::before { background-color: #1e293b; }
  .kpi-gray::before { background-color: #94a3b8; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="glass-header sticky top-0 z-50 px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <img src="https://ferramentas.morangostatui.com.br/logo.png" alt="Morangos Tatuí" class="w-10 h-10 object-contain rounded-lg">
    <div class="flex flex-col">
      <h1 class="font-sans text-lg font-black text-slate-900 leading-none">Morangos Tatuí</h1>
      <span class="text-[10px] font-bold text-brand-600 uppercase tracking-widest mt-1">Gestão Financeira</span>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="periodLabel" class="text-xs font-medium text-slate-500 bg-slate-100 border border-slate-200 rounded-full px-4 py-1.5 hidden md:block">—</div>
    <div id="btnRefresh" onclick="refreshData()" class="hidden items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-semibold text-slate-700 hover:border-brand-500 hover:text-brand-600 transition-colors">
      <i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="refreshIcon"></i> Atualizar
    </div>
  </div>
</header>

<main id="loginScreen" class="flex-1 flex flex-col items-center justify-center p-6">
  <div class="bg-white border border-slate-200 rounded-2xl p-10 max-w-md w-full text-center shadow-sm">
    <img src="https://ferramentas.morangostatui.com.br/logo.png" alt="Logo" class="w-24 mx-auto mb-6">
    <h2 class="font-sans text-2xl font-black text-slate-900 mb-2">Painel Financeiro</h2>
    <p class="text-sm text-slate-500 mb-8">Conecte sua conta Google autorizada.</p>
    <button onclick="signIn()" class="w-full flex items-center justify-center gap-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl py-3.5 text-sm font-semibold transition-all shadow-sm">
      Acessar com Google
    </button>
  </div>
</main>

<main id="loadingScreen" class="hidden flex-1 flex-col items-center justify-center p-6 gap-4">
  <i data-lucide="loader-2" class="w-10 h-10 text-brand-600 animate-spin"></i>
  <div id="loadingText" class="text-sm font-medium text-slate-500">Carregando dados...</div>
</main>

<main id="errorScreen" class="hidden flex-1 flex-col items-center justify-center p-6 text-center">
  <i data-lucide="alert-triangle" class="w-12 h-12 text-rose-500 mx-auto mb-4"></i>
  <h3 id="errorMsg" class="text-slate-900 font-bold mb-4">Erro ao carregar</h3>
  <button onclick="retryLoad()" class="bg-slate-900 text-white px-6 py-2 rounded-lg">Tentar Novamente</button>
</main>

<div id="appShell" class="hidden flex-col flex-1">
  <div class="bg-white border-b border-slate-200 px-6 py-2.5 flex items-center gap-3 flex-wrap sticky top-[65px] z-40">
    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Filtro</span>
    <button class="fbtn active px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold bg-white [&.active]:bg-brand-600 [&.active]:text-white" onclick="setFilter('all',this)">Tudo</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('today',this)">Hoje</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('yesterday',this)">Ontem</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('7days',this)">7 Dias</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('week',this)">Esta Semana</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('month',this)">Este Mês</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('custom',this)">Personalizado</button>
    
    <div id="customRange" class="hidden items-center gap-2">
      <input type="date" id="dateFrom" class="border p-1.5 text-xs rounded-lg">
      <input type="date" id="dateTo" class="border p-1.5 text-xs rounded-lg">
      <button onclick="applyCustom()" class="bg-slate-900 text-white px-3 py-1.5 rounded-lg text-xs">Ok</button>
    </div>
  </div>

  <nav class="bg-white border-b border-slate-200 px-6 flex overflow-x-auto sticky top-[113px] z-30">
    <button class="tab-btn active px-4 py-3.5 text-sm flex items-center gap-2" onclick="setTab('visao',this)"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Visão Geral</button>
    <button class="tab-btn px-4 py-3.5 text-sm flex items-center gap-2" onclick="setTab('caixa',this)"><i data-lucide="wallet" class="w-4 h-4"></i> Fluxo de Caixa</button>
    <button class="tab-btn px-4 py-3.5 text-sm flex items-center gap-2" onclick="setTab('parcelas',this)"><i data-lucide="calendar-clock" class="w-4 h-4"></i> Parcelas & Cartões</button>
  </nav>

  <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
    <div id="tab-visao" class="tab-panel fade-in block"></div>
    <div id="tab-caixa" class="tab-panel fade-in hidden"></div>
    <div id="tab-parcelas" class="tab-panel fade-in hidden"></div>
  </main>
</div>

<script>
const CLIENT_ID='781310015266-iff0bmklrbkv3mt6no32gel47tfs3jeu.apps.googleusercontent.com';
const SHEET_ID='1cyM1DI29ob_hF3BomDazojTo-nn3j8kJowpbqh7R8Tg';
const SCOPES='https://www.googleapis.com/auth/spreadsheets.readonly';

let tokenClient, accessToken=null, charts={};
let RAW_MOV=[], RAW_FEC=[], RAW_PARC=[], RAW_CART=[], RAW_COMP=[];
let currentFilter='all', customFrom=null, customTo=null;

lucide.createIcons();

function loadGIS(){
  const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID, scope:SCOPES,
      callback:async r=>{
        if(r.error){showError(r.error);return;}
        accessToken=r.access_token; await loadAllData();
      }
    });
  };
  document.head.appendChild(s);
}

function signIn(){ tokenClient.requestAccessToken({prompt:'consent'}); }

async function fetchSheet(name){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  const j=await r.json(); const [h,...rows]=j.values||[];
  return rows.map(r=>{const o={}; h.forEach((k,i)=>o[k]=r[i]??''); return o;});
}

async function loadAllData(){
  try{
    showLoading('Lendo dados...');
    [RAW_MOV, RAW_FEC, RAW_PARC, RAW_CART, RAW_COMP] = await Promise.all([
        fetchSheet('Movimentacoes'), fetchSheet('Fechamento'), fetchSheet('Parcelas'),
        fetchSheet('Cartoes_Emprestimos'), fetchSheet('Compras_Cartao')
    ]);
    renderAll(); showDashboard();
  } catch(e){ showError(e.message); }
}

// ── LÓGICA DE FILTROS ──
function parseDate(v){
  if(!v)return null; const s=String(v).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);}
  return new Date(s);
}

function getRange(){
  const now=new Date(); const td=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(currentFilter==='today') return {f:td, t:td};
  if(currentFilter==='yesterday'){ const y=new Date(td); y.setDate(td.getDate()-1); return {f:y,t:y}; }
  if(currentFilter==='7days'){ const f=new Date(td); f.setDate(td.getDate()-6); return {f:f,t:td}; }
  if(currentFilter==='week'){ const day=td.getDay()||7; const m=new Date(td); m.setDate(td.getDate()-day+1); const s=new Date(m); s.setDate(m.getDate()+6); return{f:m,t:s}; }
  if(currentFilter==='month') return {f:new Date(td.getFullYear(),td.getMonth(),1), t:new Date(td.getFullYear(),td.getMonth()+1,0)};
  if(currentFilter==='custom' && customFrom) return {f:customFrom, t:customTo};
  return {f:new Date(2000,0,1), t:new Date(2100,0,1)};
}

function filterRows(rows,field){
  const {f,t}=getRange();
  return rows.filter(r=>{
    const d=parseDate(r[field]); if(!d)return false;
    const day=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    return day>=f && day<=t;
  });
}

// ── PROCESSAMENTO DE DADOS ──
function num(v){if(!v)return 0; return parseFloat(String(v).replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.'))||0;}
const R=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});

function processData(mov, fec, parc, cart, comp){
  const cartMap = {};
  (cart || []).forEach(c => { 
    if(c.ID_Cartao) cartMap[c.ID_Cartao] = { ...c, faturas: {}, totalPendente: 0 }; 
  });

  // Agrupamento de parcelas por Mês dentro de cada Cartão
  (parc || []).filter(p => (p.Status || '').toLowerCase().includes('pend')).forEach(p => {
    const compra = comp.find(c => c.ID_Compra === p.ID_Compra_Ref);
    const idC = compra ? compra.Cartao : 'BOLETO';
    const mes = p.Fatura_Mes || 'Outros';

    if(cartMap[idC]){
      if(!cartMap[idC].faturas[mes]) cartMap[idC].faturas[mes] = { total: 0, itens: [] };
      const v = num(p.Valor_Parcela);
      cartMap[idC].faturas[mes].total += v;
      cartMap[idC].totalPendente += v;
      cartMap[idC].faturas[mes].itens.push({ desc: compra?.Descricao || p.Descricao_Parcela, valor: v });
    }
  });

  const k = {
    vBruto: mov.filter(r=>r.Categoria==='Vendas').reduce((a,r)=>a+num(r.Valor),0),
    tEnt: fec.reduce((a,r)=>a+num(r.Total_Entradas),0),
    tSai: fec.reduce((a,r)=>a+num(r.Total_Saidas),0),
    saldo: fec.length ? num(fec[fec.length-1].Saldo_Real) : 0
  };

  return { k, cartoes: Object.values(cartMap), fecData: fec };
}

// ── RENDERIZAÇÃO ──
function renderAll(){
  const d = processData(filterRows(RAW_MOV,'Data'), filterRows(RAW_FEC,'Data_Caixa'), RAW_PARC, RAW_CART, RAW_COMP);
  document.getElementById('periodLabel').textContent = currentFilter;
  buildVisao(d);
  buildCaixa(d);
  buildParcelas(d);
  lucide.createIcons();
}

function buildParcelas(d){
  const cartColors = {'CARD01':'bg-brand-600','CARD02':'bg-slate-900','CARD03':'bg-slate-600','LCRED01':'bg-slate-600','BOLETO':'bg-amber-600'};
  
  const html = d.cartoes.filter(c => c.totalPendente > 0).map(c => {
    const cor = cartColors[c.ID_Cartao] || 'bg-slate-500';
    const faturasHtml = Object.keys(c.faturas).map(mes => {
      const fat = c.faturas[mes];
      const uid = `fat_${c.ID_Cartao}_${mes.replace(/\s/g,'')}`;
      return `
        <div class="border-b border-slate-100 last:border-0">
          <button onclick="toggleParcelas('${uid}')" class="w-full flex justify-between p-4 text-sm font-bold text-slate-700">
            <span>${mes}</span>
            <div class="flex gap-2"><span>${R(fat.total)}</span><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
          </button>
          <div id="${uid}" class="hidden bg-slate-50 px-4 pb-3 text-xs">
            ${fat.itens.map(i => `<div class="flex justify-between py-1 border-b border-slate-200"><span>${i.desc}</span><span>${R(i.valor)}</span></div>`).join('')}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
        <div class="${cor} p-4 text-white flex justify-between items-end">
          <div><div class="text-[10px] opacity-70">CARTÃO</div><div class="font-bold">${c.Nome_Conta}</div></div>
          <div class="text-right"><div class="text-[10px] opacity-70">TOTAL</div><div class="font-black">${R(c.totalPendente)}</div></div>
        </div>
        ${faturasHtml}
      </div>`;
  }).join('');

  document.getElementById('tab-parcelas').innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">${html}</div>`;
}

function buildVisao(d){
  document.getElementById('tab-visao').innerHTML = `
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="kpi-card kpi-brand bg-white p-5 rounded-xl shadow-sm">
        <div class="text-[10px] font-bold text-slate-500">VENDAS BRUTAS</div>
        <div class="text-2xl font-black">${R(d.k.vBruto)}</div>
      </div>
      <div class="kpi-card kpi-dark bg-white p-5 rounded-xl shadow-sm">
        <div class="text-[10px] font-bold text-slate-500">TOTAL SAÍDAS</div>
        <div class="text-2xl font-black">${R(d.k.tSai)}</div>
      </div>
      <div class="kpi-card kpi-green bg-white p-5 rounded-xl shadow-sm">
        <div class="text-[10px] font-bold text-slate-500">SALDO EM CAIXA</div>
        <div class="text-2xl font-black">${R(d.k.saldo)}</div>
      </div>
    </div>
  `;
}

function buildCaixa(d){ /* Gráficos de caixa similares ao anterior */ }

function setFilter(name, btn){
  currentFilter=name;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('customRange').classList.toggle('hidden', name!=='custom');
  if(name!=='custom') renderAll();
}

function applyCustom(){
  customFrom = new Date(document.getElementById('dateFrom').value);
  customTo = new Date(document.getElementById('dateTo').value);
  renderAll();
}

function toggleParcelas(id){ document.getElementById(id).classList.toggle('hidden'); }
function setTab(name, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  btn.classList.add('active');
}

function showLoading(msg){ 
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('loadingScreen').classList.remove('hidden');
  document.getElementById('loadingText').textContent = msg;
}

function showDashboard(){
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('btnRefresh').classList.remove('hidden');
}

loadGIS();
</script>
</body>
</html>
