<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morangos Tatuí · Financeiro Pro</title>
<link rel="icon" type="image/jpeg" href="https://ferramentas.morangostatui.com.br/favicon.jpg">
<link rel="apple-touch-icon" href="https://ferramentas.morangostatui.com.br/favicon.jpg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['"DM Sans"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] },
        colors: { brand: { 50: '#fff1f2', 100: '#ffe4e6', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c' } }
      }
    }
  }
</script>

<style>
  body { background-color: #f8fafc; color: #0f172a; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .tab-btn { position: relative; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: #e11d48; font-weight: 600; border-color: #e11d48; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 12px 12px 0 0; }
  .kpi-brand::before { background-color: #e11d48; }
  .kpi-green::before { background-color: #10b981; }
  .kpi-dark::before { background-color: #1e293b; }
  .kpi-gray::before { background-color: #94a3b8; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="glass-header sticky top-0 z-50 px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <img src="https://ferramentas.morangostatui.com.br/logo.png" alt="Logo" class="w-10 h-10 object-contain rounded-lg">
    <div class="flex flex-col">
      <h1 class="font-sans text-lg font-black text-slate-900 leading-none">Morangos Tatuí</h1>
      <span class="text-[10px] font-bold text-brand-600 uppercase tracking-widest mt-1">Gestão Financeira</span>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="periodLabel" class="text-xs font-medium text-slate-500 bg-slate-100 border border-slate-200 rounded-full px-4 py-1.5 hidden md:block">—</div>
    <button id="btnRefresh" onclick="refreshData()" class="hidden items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-semibold hover:border-brand-500 transition-colors">
      <i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="refreshIcon"></i> Atualizar
    </button>
  </div>
</header>

<main id="loginScreen" class="flex-1 flex flex-col items-center justify-center p-6">
  <div class="bg-white border border-slate-200 rounded-2xl p-10 max-w-md w-full text-center shadow-sm">
    <img src="https://ferramentas.morangostatui.com.br/logo.png" class="w-24 mx-auto mb-6">
    <h2 class="text-2xl font-black mb-2">Painel Financeiro</h2>
    <button onclick="signIn()" class="w-full bg-brand-600 text-white rounded-xl py-3.5 font-semibold shadow-sm hover:bg-brand-700 transition-all">Acessar com Google</button>
  </div>
</main>

<main id="loadingScreen" class="hidden flex-1 flex-col items-center justify-center p-6 gap-4">
  <i data-lucide="loader-2" class="w-10 h-10 text-brand-600 animate-spin"></i>
  <div id="loadingText" class="text-sm font-medium text-slate-500">Sincronizando dados...</div>
</main>

<div id="appShell" class="hidden flex-col flex-1">
  <div class="bg-white border-b border-slate-200 px-6 py-2.5 flex items-center gap-3 flex-wrap sticky top-[65px] z-40">
    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mr-1">Filtro</span>
    <button class="fbtn active px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold bg-white [&.active]:bg-brand-600 [&.active]:text-white" onclick="setFilter('all',this)">Tudo</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('today',this)">Hoje</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('yesterday',this)">Ontem</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('7days',this)">7 Dias</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('week',this)">Esta Semana</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('month',this)">Este Mês</button>
    <button class="fbtn px-4 py-1.5 rounded-full border border-slate-200 text-xs font-semibold" onclick="setFilter('custom',this)">Personalizado</button>
    
    <div id="customRange" class="hidden items-center gap-2 ml-2">
      <input type="date" id="dateFrom" class="border rounded-lg px-2 py-1 text-xs outline-none focus:border-brand-500">
      <input type="date" id="dateTo" class="border rounded-lg px-2 py-1 text-xs outline-none focus:border-brand-500">
      <button onclick="applyCustom()" class="bg-slate-900 text-white rounded-lg px-3 py-1 text-xs font-bold">Aplicar</button>
    </div>
  </div>

  <nav class="bg-white border-b border-slate-200 px-6 flex overflow-x-auto sticky top-[113px] z-30">
    <button class="tab-btn active px-4 py-3.5 text-sm font-medium text-slate-500 whitespace-nowrap flex items-center gap-2" onclick="setTab('visao',this)"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Visão Geral</button>
    <button class="tab-btn px-4 py-3.5 text-sm font-medium text-slate-500 whitespace-nowrap flex items-center gap-2" onclick="setTab('caixa',this)"><i data-lucide="wallet" class="w-4 h-4"></i> Fluxo de Caixa</button>
    <button class="tab-btn px-4 py-3.5 text-sm font-medium text-slate-500 whitespace-nowrap flex items-center gap-2" onclick="setTab('saidas',this)"><i data-lucide="trending-down" class="w-4 h-4"></i> Saídas</button>
    <button class="tab-btn px-4 py-3.5 text-sm font-medium text-slate-500 whitespace-nowrap flex items-center gap-2" onclick="setTab('pagamentos',this)"><i data-lucide="credit-card" class="w-4 h-4"></i> Pagamentos</button>
    <button class="tab-btn px-4 py-3.5 text-sm font-medium text-slate-500 whitespace-nowrap flex items-center gap-2" onclick="setTab('parcelas',this)"><i data-lucide="calendar-clock" class="w-4 h-4"></i> Parcelas & Cartões</button>
  </nav>

  <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
    <div id="tab-visao" class="tab-panel fade-in block"></div>
    <div id="tab-caixa" class="tab-panel fade-in hidden"></div>
    <div id="tab-saidas" class="tab-panel fade-in hidden"></div>
    <div id="tab-pagamentos" class="tab-panel fade-in hidden"></div>
    <div id="tab-parcelas" class="tab-panel fade-in hidden"></div>
  </main>
</div>

<script>
const CLIENT_ID='781310015266-iff0bmklrbkv3mt6no32gel47tfs3jeu.apps.googleusercontent.com';
const SHEET_ID='1cyM1DI29ob_hF3BomDazojTo-nn3j8kJowpbqh7R8Tg';
const SCOPES='https://www.googleapis.com/auth/spreadsheets.readonly';

let tokenClient, accessToken=null, charts={};
let RAW_MOV=[], RAW_FEC=[], RAW_PARC=[], RAW_CART=[], RAW_COMP=[];
let currentFilter='all', customFrom=null, customTo=null;

const R=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const num=v=>{if(!v)return 0; return parseFloat(String(v).replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.'))||0;};
const COLORS=['#e11d48','#0f172a','#64748b','#94a3b8','#f59e0b','#10b981','#3b82f6','#8b5cf6','#d97706','#cbd5e1'];
const BF={family:'"DM Sans", sans-serif'};
const AX={grid:{color:'#f1f5f9'}, ticks:{font:BF, color:'#64748b', size:11}};

// ── AUTH & DATA ──
function loadGIS(){
  const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
  s.onload=()=> tokenClient=google.accounts.oauth2.initTokenClient({ client_id:CLIENT_ID, scope:SCOPES, callback: async r=>{accessToken=r.access_token; await loadAllData();}});
  document.head.appendChild(s);
}
function signIn(){ tokenClient.requestAccessToken({prompt:'consent'}); }
async function fetchSheet(name){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  const j=await r.json(); const [h,...rows]=j.values||[];
  return rows.map(r=>{const o={}; h.forEach((k,i)=>o[k]=r[i]??''); return o;});
}
async function loadAllData(){
  showLoading('Buscando dados...');
  try {
    [RAW_MOV, RAW_FEC, RAW_PARC, RAW_CART, RAW_COMP] = await Promise.all([fetchSheet('Movimentacoes'), fetchSheet('Fechamento'), fetchSheet('Parcelas'), fetchSheet('Cartoes_Emprestimos'), fetchSheet('Compras_Cartao')]);
    renderAll(); showDashboard();
  } catch(e) { alert("Erro ao carregar dados: " + e.message); }
}

// ── FILTROS ──
function parseDate(v){
  if(!v)return null; const s=String(v).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);}
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return new Date(s.substring(0,10));
  return new Date(s);
}
function getRange(){
  const now=new Date(); const td=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(currentFilter==='today') return {f:td, t:td};
  if(currentFilter==='yesterday'){ const y=new Date(td); y.setDate(td.getDate()-1); return {f:y,t:y}; }
  if(currentFilter==='7days'){ const f=new Date(td); f.setDate(td.getDate()-6); return {f:f,t:td}; }
  if(currentFilter==='week'){ const day=td.getDay()||7; const m=new Date(td); m.setDate(td.getDate()-day+1); const s=new Date(m); s.setDate(m.getDate()+6); return{f:m,t:s}; }
  if(currentFilter==='month') return {f:new Date(td.getFullYear(),td.getMonth(),1), t:new Date(td.getFullYear(),td.getMonth()+1,0)};
  if(currentFilter==='custom' && customFrom) return {f:customFrom, t:customTo};
  return {f:new Date(2000,0,1), t:new Date(2100,0,1)};
}
function filterRows(rows,field){
  const {f,t}=getRange();
  return rows.filter(r=>{
    const d=parseDate(r[field]); if(!d)return false;
    const day=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    return day>=f && day<=t;
  });
}

// ── PROCESSAMENTO ──
function processData(mov, fec, parc, cart, comp){
  const k = {
    vBruto: mov.filter(r=>r.Categoria==='Vendas').reduce((a,r)=>a+num(r.Valor),0),
    vLiq: mov.filter(r=>r.Categoria==='Vendas').reduce((a,r)=>a+num(r.Valor_Liquido||r.Valor),0),
    tEnt: fec.reduce((a,r)=>a+num(r.Total_Entradas),0),
    tSai: fec.reduce((a,r)=>a+num(r.Total_Saidas),0),
    saldo: fec.length ? num(fec[fec.length-1].Saldo_Real) : 0,
    pessoal: mov.filter(r=>['Gastos pessoais','Alimentação','Gasolina'].includes(r.Categoria)).reduce((a,r)=>a+num(r.Valor),0)
  };

  // Vendas dia
  const vMap={}; mov.filter(r=>r.Categoria==='Vendas').forEach(r=>{ const d=parseDate(r.Data); if(d){ const k=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); vMap[k]=(vMap[k]||0)+num(r.Valor); }});
  
  // Saídas
  const saiMap={}; mov.filter(r=>r.Tipo==='Saída').forEach(r=>{ const c=r.Categoria||'Outros'; saiMap[c]=(saiMap[c]||0)+num(r.Valor); });
  const saidas=Object.entries(saiMap).sort((a,b)=>b[1]-a[1]).map(([c,v])=>({c,v}));

  // Pagamentos
  const fpMap={}, fpLiq={}; mov.filter(r=>r.Tipo==='Entrada').forEach(r=>{ const fp=r.Forma_Pagamento||'Outros'; fpMap[fp]=(fpMap[fp]||0)+num(r.Valor); fpLiq[fp]=(fpLiq[fp]||0)+num(r.Valor_Liquido||r.Valor); });
  const entFP=Object.entries(fpMap).sort((a,b)=>b[1]-a[1]).map(([fp,v])=>({fp, bruto:v, liq:fpLiq[fp]}));

  // Cartões & Faturas Agrupadas
  const cartMap = {};
  cart.forEach(c => { if(c.ID_Cartao) cartMap[c.ID_Cartao] = { ...c, faturas: {}, totalPendente: 0 }; });
  
  const ordenarMeses = (arr) => {
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    return arr.sort((a, b) => {
        const [mA, aA] = a.split(' - '); const [mB, aB] = b.split(' - ');
        if(aA !== aB) return aA - aB;
        return meses.findIndex(m => mA.includes(m)) - meses.findIndex(m => mB.includes(m));
    });
  };

  parc.filter(p => (p.Status||'').toLowerCase().includes('pend')).forEach(p => {
    const cp = comp.find(c => c.ID_Compra === p.ID_Compra_Ref);
    const idC = cp ? cp.Cartao : 'BOLETO';
    const mes = p.Fatura_Mes || 'Sem Data';
    if(cartMap[idC]){
      if(!cartMap[idC].faturas[mes]) cartMap[idC].faturas[mes] = { total: 0, itens: [] };
      const v = num(p.Valor_Parcela);
      cartMap[idC].faturas[mes].total += v;
      cartMap[idC].totalPendente += v;
      cartMap[idC].faturas[mes].itens.push({ desc: cp?.Descricao || p.Descricao_Parcela, valor: v });
    }
  });

  return { k, vendasDia: Object.entries(vMap).map(([d,v])=>({d,v})), saidas, entFP, fec, cartoes: Object.values(cartMap), ordenarMeses };
}

// ── RENDER ──
function renderAll(){
  Object.values(charts).forEach(c=>c.destroy());
  const d = processData(filterRows(RAW_MOV,'Data'), filterRows(RAW_FEC,'Data_Caixa'), RAW_PARC, RAW_CART, RAW_COMP);
  document.getElementById('periodLabel').textContent = currentFilter.toUpperCase();
  
  buildVisao(d);
  buildCaixa(d);
  buildSaidas(d);
  buildPagamentos(d);
  buildParcelas(d);
  lucide.createIcons();
}

function secTitle(t, i) { return `<div class="font-sans text-xl font-bold text-slate-900 flex items-center gap-3 mb-6 border-b pb-3"><i data-lucide="${i}" class="text-brand-600"></i> ${t}</div>`; }

function buildVisao(d){
  document.getElementById('tab-visao').innerHTML = `
    ${secTitle('Indicadores do Período', 'bar-chart-3')}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="kpi-card kpi-brand bg-white p-5 rounded-xl shadow-sm relative overflow-hidden">
        <div class="text-[10px] uppercase font-bold text-slate-500 mb-1">Vendas Brutas</div>
        <div class="text-3xl font-black text-slate-900">${R(d.k.vBruto)}</div>
      </div>
      <div class="kpi-card kpi-green bg-white p-5 rounded-xl shadow-sm relative overflow-hidden">
        <div class="text-[10px] uppercase font-bold text-slate-500 mb-1">Vendas Líquidas</div>
        <div class="text-3xl font-black text-slate-900">${R(d.k.vLiq)}</div>
      </div>
      <div class="kpi-card kpi-dark bg-white p-5 rounded-xl shadow-sm relative overflow-hidden">
        <div class="text-[10px] uppercase font-bold text-slate-500 mb-1">Total Saídas</div>
        <div class="text-3xl font-black text-slate-900">${R(d.k.tSai)}</div>
      </div>
      <div class="kpi-card kpi-gray bg-white p-5 rounded-xl shadow-sm relative overflow-hidden">
        <div class="text-[10px] uppercase font-bold text-slate-500 mb-1">Saldo em Caixa</div>
        <div class="text-3xl font-black text-slate-900">${R(d.k.saldo)}</div>
      </div>
    </div>
    <div class="bg-white border rounded-xl p-6 shadow-sm mb-6">
      <h3 class="font-bold text-slate-900 mb-4">Faturamento Diário</h3>
      <div class="h-64"><canvas id="cVendas"></canvas></div>
    </div>
  `;
  charts.v = new Chart(document.getElementById('cVendas'), { type: 'bar', data: { labels: d.vendasDia.map(x=>x.d), datasets:[{data:d.vendasDia.map(x=>x.v), backgroundColor:'#e11d48', borderRadius:4}]}, options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:AX, y:AX}}});
}

function buildCaixa(d){
  document.getElementById('tab-caixa').innerHTML = `
    ${secTitle('Fluxo de Caixa', 'wallet')}
    <div class="bg-white border rounded-xl p-6 shadow-sm">
      <h3 class="font-bold text-slate-900 mb-4">Evolução do Saldo Real</h3>
      <div class="h-80"><canvas id="cSaldo"></canvas></div>
    </div>
  `;
  const fData = d.fec.map(r=>({d:r.Data_Caixa, s:num(r.Saldo_Real)}));
  charts.s = new Chart(document.getElementById('cSaldo'), { type: 'line', data: { labels: fData.map(x=>x.d), datasets:[{label:'Saldo', data:fData.map(x=>x.s), borderColor:'#0f172a', tension:0.3, fill:true, backgroundColor:'rgba(15,23,42,0.05)'}]}, options: { responsive:true, maintainAspectRatio:false, scales:{x:AX, y:AX}}});
}

function buildSaidas(d){
  const rows = d.saidas.map((x,i)=>`<tr class="border-b text-sm"><td class="py-3 px-4 text-slate-400">${i+1}</td><td class="py-3 px-4 font-bold">${x.c}</td><td class="py-3 px-4 text-right font-black">${R(x.v)}</td></tr>`).join('');
  document.getElementById('tab-saidas').innerHTML = `
    ${secTitle('Análise de Saídas', 'trending-down')}
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white border rounded-xl p-6 shadow-sm">
         <h3 class="font-bold mb-4">Top Categorias</h3>
         <div class="h-64"><canvas id="cSai"></canvas></div>
      </div>
      <div class="bg-white border rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-left">
          <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase"><tr><th class="p-4">#</th><th class="p-4">Categoria</th><th class="p-4 text-right">Valor</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  charts.sai = new Chart(document.getElementById('cSai'), { type: 'doughnut', data: { labels: d.saidas.slice(0,5).map(x=>x.c), datasets:[{data:d.saidas.slice(0,5).map(x=>x.v), backgroundColor:COLORS}]}, options:{responsive:true, maintainAspectRatio:false}});
}

function buildPagamentos(d){
  const rows = d.entFP.map(x=>`<div class="flex justify-between items-center py-3 border-b last:border-0"><div class="text-sm font-bold text-slate-700">${x.fp}</div><div class="text-right"><div class="text-sm font-black">${R(x.bruto)}</div><div class="text-[10px] text-emerald-600">Líq: ${R(x.liq)}</div></div></div>`).join('');
  document.getElementById('tab-pagamentos').innerHTML = `
    ${secTitle('Meios de Pagamento', 'credit-card')}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
       <div class="bg-white border rounded-xl p-6 shadow-sm"><div class="h-64"><canvas id="cFP"></canvas></div></div>
       <div class="bg-white border rounded-xl p-6 shadow-sm">
         <h3 class="font-bold mb-4">Volume por Modalidade</h3>
         ${rows}
       </div>
    </div>
  `;
  charts.fp = new Chart(document.getElementById('cFP'), { type: 'bar', data: { labels: d.entFP.map(x=>x.fp), datasets:[{label:'Bruto', data:d.entFP.map(x=>x.bruto), backgroundColor:'#1e293b'},{label:'Líquido', data:d.entFP.map(x=>x.liq), backgroundColor:'#e11d48'}]}, options:{responsive:true, maintainAspectRatio:false, scales:{x:AX, y:AX}}});
}

function buildParcelas(d){
  const cartColors = {'CARD01':'bg-brand-600','CARD02':'bg-slate-900','CARD03':'bg-slate-600','LCRED01':'bg-slate-600','BOLETO':'bg-amber-600'};
  
  const cartoesHtml = d.cartoes.filter(c => c.totalPendente > 0).map(c => {
    const cor = cartColors[c.ID_Cartao] || 'bg-slate-500';
    const meses = d.ordenarMeses(Object.keys(c.faturas));
    
    const faturasHtml = meses.map(m => {
      const fat = c.faturas[m];
      const uid = `fat_${c.ID_Cartao}_${m.replace(/\s/g,'')}`;
      return `
        <div class="border-b last:border-0">
          <button onclick="toggleParcelas('${uid}')" class="w-full flex justify-between p-4 text-sm hover:bg-slate-50">
            <span class="font-bold text-slate-700">${m}</span>
            <div class="flex items-center gap-2 font-black text-slate-900">${R(fat.total)} <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i></div>
          </button>
          <div id="${uid}" class="hidden bg-slate-50 px-4 pb-3">
            ${fat.itens.map(i => `<div class="flex justify-between py-1.5 text-xs border-b border-slate-200 last:border-0"><span class="text-slate-500 truncate pr-4">${i.desc}</span><span class="font-bold text-slate-700">${R(i.valor)}</span></div>`).join('')}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="bg-white border rounded-2xl overflow-hidden shadow-sm flex flex-col">
        <div class="${cor} p-5 text-white">
          <div class="flex justify-between items-start mb-4">
            <div><div class="text-[10px] opacity-70 uppercase tracking-widest font-bold">Cartão / Conta</div><div class="text-xl font-black">${c.Nome_Conta}</div></div>
            <div class="text-right"><div class="text-[10px] opacity-70 uppercase tracking-widest font-bold">Pendente</div><div class="text-2xl font-black">${R(c.totalPendente)}</div></div>
          </div>
          <div class="h-24 w-full bg-white/10 rounded-lg p-2"><canvas id="chart_${c.ID_Cartao}"></canvas></div>
        </div>
        <div class="flex-1">${faturasHtml}</div>
      </div>`;
  }).join('');

  document.getElementById('tab-parcelas').innerHTML = `
    ${secTitle('Planejamento de Faturas', 'calendar-clock')}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${cartoesHtml}</div>
  `;

  // Renderizar minigráficos de cada cartão
  d.cartoes.filter(c => c.totalPendente > 0).forEach(c => {
    const meses = d.ordenarMeses(Object.keys(c.faturas));
    new Chart(document.getElementById(`chart_${c.ID_Cartao}`), {
      type: 'bar',
      data: { labels: meses.map(m=>m.split(' ')[1]), datasets: [{ data: meses.map(m=>c.faturas[m].total), backgroundColor: 'rgba(255,255,255,0.8)', borderRadius: 4 }]},
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{display:false}}}
    });
  });
}

// ── UI HELPERS ──
function toggleParcelas(id){ document.getElementById(id).classList.toggle('hidden'); }
function setTab(name, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  btn.classList.add('active');
}
function setFilter(name, btn){
  currentFilter=name;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active', 'bg-brand-600', 'text-white'));
  btn.classList.add('active', 'bg-brand-600', 'text-white');
  document.getElementById('customRange').classList.toggle('hidden', name!=='custom');
  if(name!=='custom') renderAll();
}
function applyCustom(){
  customFrom = new Date(document.getElementById('dateFrom').value);
  customTo = new Date(document.getElementById('dateTo').value);
  renderAll();
}
function showLoading(msg){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('loadingScreen').classList.remove('hidden');
  document.getElementById('loadingText').textContent = msg;
}
function showDashboard(){
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('btnRefresh').classList.remove('hidden');
}
async function refreshData(){
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('animate-spin');
  await loadAllData();
  icon.classList.remove('animate-spin');
}

loadGIS();
</script>
