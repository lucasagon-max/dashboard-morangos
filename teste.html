<script>
let allData = [];
let catalogProducts = [];
let allClients = [];
let currentEncItems = [];

const MP_ACCESS_TOKEN = 'APP_USR-7398589288908992-032715-7dd4cc5f51a2968edb29e1a6a55947d2-2908485918';
const CHAVE_PIX_ALEATORIA = '7fdc442f-35de-46f2-9190-530344229f25';

// UTILITÁRIOS
function toast(text, bg = "#e11d48") { Toastify({ text, duration: 3000, style: { background: bg, fontWeight: 'bold', borderRadius: '12px' } }).showToast(); }
function formatMoney(val) { return Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
function formatPhone(v) {
    v = v.replace(/\D/g, '').slice(0, 11);
    if (v.length <= 2) return `(${v}`;
    if (v.length <= 7) return `(${v.slice(0,2)}) ${v.slice(2)}`;
    return `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
}
function parseMoney(val) {
    if (!val) return 0;
    // Trata "R$ 1.234,56" e "1234,56" e "1234.56" corretamente
    let clean = String(val).replace('R$', '').replace(/\s/g, '');
    if (clean.includes(',') && clean.includes('.')) {
        // Formato brasileiro com milhar: 1.234,56
        clean = clean.replace(/\./g, '').replace(',', '.');
    } else {
        clean = clean.replace(',', '.');
    }
    return parseFloat(clean) || 0;
}

// BUG 2 CORRIGIDO: parsePrices havia sido removida mas ainda era usada em showVariationOptions
function parsePrices(preco) {
    const strPreco = String(preco || '0');
    if (strPreco.includes('|')) {
        return strPreco.split('|').map(part => {
            const [label, val] = part.split(':');
            return { label: label.trim(), val: parseMoney(val) };
        });
    }
    return [{ label: null, val: parseMoney(strPreco) }];
}

function formatInputMoney(el) { el.value = parseMoney(el.value).toFixed(2).replace('.', ','); }
function formatDateBr(isoString) {
    if (!isoString) return 'Data não definida';
    const d = new Date(isoString);
    return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function normalizeStr(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : ""; }
function formatCEPInput(el) { let v = el.value.replace(/\D/g, '').slice(0, 8); if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5); el.value = v; }

function getEnderecoCliente(clienteStr) {
    if(!clienteStr) return '';
    const pm = clienteStr.match(/\(?(\d{2})\)?\s*(\d{4,5})-?(\d{4})/);
    if(pm) {
        const tel = pm[1] + pm[2] + pm[3];
        const cl = allClients.find(c => c.telefone === tel);
        if(cl && (cl.rua || cl.bairro)) {
            let parts = [];
            if(cl.rua) parts.push(cl.rua);
            if(cl.numero) parts.push(cl.numero);
            if(cl.bairro) parts.push(cl.bairro);
            return parts.join(', ');
        }
    }
    return '';
}

function switchTab(tabId) {
    ['encomendas', 'producao'].forEach(id => {
        document.getElementById(`tab-${id}`).style.display = 'none';
        document.getElementById(`btn-tab-${id}`).classList.remove('active');
    });
    document.getElementById(`tab-${tabId}`).style.display = 'block';
    document.getElementById(`btn-tab-${tabId}`).classList.add('active');
    if (tabId === 'producao') renderProducao();
}

// DADOS
async function loadData() {
    try {
        const { data, error } = await supabaseClient.from('pedidos').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        allData = data;
        renderEncomendas();
    } catch (err) { toast("Erro ao carregar dados", "#ef4444"); }
}
async function loadCatalogAndClients() {
    try {
        const resCat = await supabaseClient.from('produtos').select('*').eq('disponivel', 'Sim');
        if (resCat.data) catalogProducts = resCat.data;
        const resCli = await supabaseClient.from('clientes').select('*');
        if (resCli.data) allClients = resCli.data;
    } catch(e) { console.error("Erro dicionários:", e); }
}

// AGENDA
function renderEncomendas() {
    const grid = document.getElementById('grid-encomendas');
    const empty = document.getElementById('empty-encomendas');

    const encomendas = allData.filter(o => {
        const s = o.status.toLowerCase();
        return !s.includes('cancelad') && !s.includes('concluí') && (o.tipo === 'Encomenda' || o.data_entrega);
    });

    let totEnc = 0, totSinal = 0;
    encomendas.forEach(p => { totEnc += parseMoney(p.total); totSinal += parseMoney(p.sinal_pago); });
    document.getElementById('agenda-total-val').innerText = formatMoney(totEnc);
    document.getElementById('agenda-sinal-val').innerText = formatMoney(totSinal);
    document.getElementById('agenda-saldo-val').innerText = formatMoney(totEnc - totSinal);
    // BUG 5 CORRIGIDO: enc-count estava ausente no HTML e não era atualizado
    document.getElementById('enc-count').innerText = `${encomendas.length} agendadas`;

    if (encomendas.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');

    grid.innerHTML = encomendas.sort((a,b) => new Date(a.data_entrega) - new Date(b.data_entrega)).map(o => {
        const total = parseMoney(o.total), sinal = parseMoney(o.sinal_pago), saldo = total - sinal;
        let sc = "bg-slate-100 text-slate-700";
        if (o.status === "Pronto") sc = "bg-emerald-100 text-emerald-700";
        if (o.status === "Em Produção") sc = "bg-blue-100 text-blue-700";
        if (o.status === "Conta do Cliente") sc = "bg-amber-100 text-amber-700 border border-amber-200";
        if (o.status === "Aguardando Sinal") sc = "bg-rose-100 text-rose-700";

        return `
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex flex-col relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1.5 h-full bg-rose-500"></div>
            <div class="pl-2 flex flex-col h-full">
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-rose-50 text-rose-700 px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-1.5 border border-rose-100">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${formatDateBr(o.data_entrega)}
                    </div>
                    <span class="text-[10px] font-bold px-2 py-1 rounded-md ${sc}">${o.status}</span>
                </div>
                <h4 class="font-bold text-slate-800 text-lg mb-0 truncate">${o.cliente}</h4>
                ${getEnderecoCliente(o.cliente) ? `<div class="text-[10px] text-slate-400 mb-2 font-medium flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${getEnderecoCliente(o.cliente)}</div>` : '<div class="mb-2"></div>'}

// WHATSAPP
async function cobrarWhatsApp(id) {
    const o = allData.find(x => x.id == id);
    if (!o) return;

    const totalPedido = parseMoney(o.total);
    const sinalPago   = parseMoney(o.sinal_pago);
    const taxaEntrega = parseMoney(o.taxa_entrega  || '0');
    const desconto    = parseMoney(o.desconto_total || '0');
    const saldo       = totalPedido - sinalPago;
    const subtotalItens = (totalPedido - taxaEntrega) + desconto;

    let linkPagamento = '';
    if (saldo > 0.5) {
        try {
            const r = await fetch('https://api.mercadopago.com/checkout/preferences', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${MP_ACCESS_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: [{ title: `Acerto Encomenda Morangos Tatuí`, quantity: 1, currency_id: 'BRL', unit_price: Number(saldo.toFixed(2)) }], payment_methods: { excluded_payment_types: [{ id: "ticket" }] } })
            });
            const d = await r.json();
            if (d.init_point) linkPagamento = d.init_point;
        } catch (e) { linkPagamento = CHAVE_PIX_ALEATORIA; }
    }

    const nome = o.cliente.split('(')[0].trim();
    let text = `Olá, *${nome}*! Tudo bem? Aqui é da *Morangos Tatuí* \uD83C\uDF53.\n\n`;
    text += `Confirmando sua encomenda para: *${formatDateBr(o.data_entrega)}*.\n\n`;
    text += `*Resumo:*\n${(o.itens || '').replace(/\|/g, '\n')}\n`;
    text += `----------------------------\n`;
    text += `\uD83D\uDED2 Produtos: ${formatMoney(subtotalItens)}\n`;
    if (taxaEntrega > 0) text += `\uD83D\uDEF4 Entrega: ${formatMoney(taxaEntrega)}\n`;
    if (desconto > 0) text += `\uD83C\uDF81 Desconto: -${formatMoney(desconto)}\n`;
    text += `\uD83D\uDCB0 *TOTAL: ${formatMoney(totalPedido)}*\n`;
    text += `\u2705 Sinal pago: ${formatMoney(sinalPago)}\n`;
    text += `\uD83D\uDEA9 *SALDO NA ENTREGA: ${formatMoney(saldo)}*\n\n`;
    if (saldo > 0.1) {
        if (linkPagamento.startsWith('http')) text += `Para pagar com antecedência:\n\uD83D\uDC49 ${linkPagamento}\n\n`;
        else text += `Pix (copia e cola):\n\`${linkPagamento}\`\n\n`;
    }
    
    const end = getEnderecoCliente(o.cliente);
    if(end) {
        text += `\uD83D\uDCCD *Endereço de Entrega:*\n${end}\n\n`;
    }
    
    text += `Estamos preparando tudo com carinho! \uD83E\uDD70`;

    const pm = o.cliente.match(/\(?(\d{2})\)?\s*(\d{4,5})-?(\d{4})/);
    window.open("https://wa.me/" + (pm ? "55" + pm[1] + pm[2] + pm[3] : "") + "?text=" + encodeURIComponent(text), '_blank');
}

// PRODUÇÃO
function renderProducao() {
    const list = document.getElementById('lista-producao');
    const empty = document.getElementById('empty-producao');
    const pendentes = allData.filter(o => {
        const s = o.status.toLowerCase();
        return !s.includes('cancelad') && !s.includes('concluí') && (o.tipo === 'Encomenda' || o.data_entrega);
    });
    let prod = {};
    pendentes.forEach(p => {
        if (!p.itens) return;
        p.itens.split('|').forEach(str => {
            const m = str.trim().match(/^(\d+)x\s+(.+?)(?:\s+\[R\$.+\]|$)/);
            if (m) { const q = parseInt(m[1]), n = m[2].trim(); prod[n] = (prod[n]||0)+q; }
        });
    });
    const arr = Object.keys(prod).sort((a,b)=>prod[b]-prod[a]);
    if (arr.length === 0) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    list.innerHTML = arr.map(n => `
        <div class="flex items-center justify-between bg-slate-50 border border-slate-100 p-4 rounded-xl">
            <div class="flex items-center gap-4">
                <div class="bg-white border border-slate-200 w-12 h-12 rounded-lg flex items-center justify-center font-black text-rose-600 text-xl shadow-sm">${prod[n]}x</div>
                <h4 class="font-bold text-slate-800">${n}</h4>
            </div>
            <input type="checkbox" class="w-6 h-6 rounded cursor-pointer">
        </div>`).join('');
}

// MODAL
function recalcModalTotal() {
    let sub = 0;
    currentEncItems.forEach(i => sub += i.total);
    const taxa = parseMoney(document.getElementById('enc-entrega').value);
    const desc = parseMoney(document.getElementById('enc-desconto').value);
    document.getElementById('enc-total').value = ((sub + taxa) - desc).toFixed(2).replace('.', ',');
}

function renderEncItems() {
    const c = document.getElementById('enc-items-visual-list');
    c.innerHTML = currentEncItems.map(item => `
        <div class="flex justify-between items-center bg-white border border-slate-200 p-2 rounded-xl mb-2">
            <div class="flex items-center gap-3">
                <div class="flex items-center bg-slate-50 rounded-lg border border-slate-200">
                    <button onclick="changeItemQty('${item.id}',-1)" class="w-7 h-7 font-bold text-slate-500 hover:text-rose-500">-</button>
                    <span class="text-xs font-black w-5 text-center">${item.qty}</span>
                    <button onclick="changeItemQty('${item.id}',1)" class="w-7 h-7 font-bold text-slate-500 hover:text-emerald-500">+</button>
                </div>
                <span class="text-sm font-bold text-slate-700 truncate max-w-[150px]">${item.name}</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm font-black text-rose-600">${formatMoney(item.total)}</span>

    `).join('') || '<div class="text-center py-6 text-slate-400 text-xs font-bold">Carrinho vazio.</div>';

}

function changeItemQty(id, delta) {
    const item = currentEncItems.find(i => i.id === id);
    if (item) { item.qty += delta; if (item.qty <= 0) currentEncItems = currentEncItems.filter(i => i.id !== id); else item.total = item.qty * item.unitPrice; renderEncItems(); }
}
function removeItemEnc(id) { currentEncItems = currentEncItems.filter(i => i.id !== id); renderEncItems(); }
function addItemToEnc(nome, precoVal, variacao = null) {
    const nameEx = variacao ? `${nome} (${variacao})` : nome;
    const price = parseFloat(precoVal);
    const ex = currentEncItems.find(i => i.name === nameEx);
    if (ex) { ex.qty += 1; ex.total = ex.qty * ex.unitPrice; }
    else { currentEncItems.push({ id: Math.random().toString(36).substring(7), qty: 1, name: nameEx, unitPrice: price, total: price }); }
    renderEncItems(); closeVariationSelector(); document.getElementById('product-search').value = '';
    toast(`+ ${nameEx}`, "#10b981");
}
function addExtraToEnc(nome, precoVal) {
    if (!currentEncItems.length) return toast("Adicione um item primeiro!", "#f59e0b");
    const last = currentEncItems[currentEncItems.length - 1];
    if (last.name.includes('(+')) last.name = last.name.replace(')', `, ${nome})`);
    else last.name += ` (+ ${nome})`;
    last.unitPrice += parseFloat(precoVal);
    last.total = last.qty * last.unitPrice;
    renderEncItems();
}
function addAvulsoItem() {
    const nome = document.getElementById('avulso-nome').value.trim();
    const price = parseMoney(document.getElementById('avulso-preco').value);
    if (!nome) return toast("Digite o nome do item!", "#f59e0b");
    currentEncItems.push({ id: Math.random().toString(36).substring(7), qty: 1, name: nome, unitPrice: price, total: price });
    document.getElementById('avulso-nome').value = '';
    document.getElementById('avulso-preco').value = '';
    document.getElementById('form-avulso').classList.add('hidden');
    renderEncItems();
}

async function buscarCEP(cepStr) {
    const cep = cepStr.replace(/\D/g,'');
    if (cep.length === 8) {
        try {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);

            if (!d.erro) { document.getElementById('nc-rua').value = d.logradouro; document.getElementById('nc-bairro').value = d.bairro; }
            else toast('CEP não encontrado.','#f59e0b');
        } catch(e){}
    }
}

function showVariationOptions(nome, precoStr, categoria) {
    document.getElementById('product-results').classList.add('hidden');
    document.getElementById('variation-title').innerText = nome;
    let html = '';
    const prices = parsePrices(precoStr);
    if (prices.length > 1 && prices[0].label) {
        html += `<p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Tamanhos / Tipos</p>`;
        html += prices.map(v => `<div onclick="addItemToEnc('${nome.replace(/'/g,"\\'")}','${v.val}','${v.label.replace(/'/g,"\\'")}') " class="flex justify-between items-center p-3 border rounded-lg cursor-pointer hover:bg-blue-50 mb-1"><span class="text-sm font-medium">${v.label}</span><span class="text-sm font-bold text-blue-600">${formatMoney(v.val)}</span></div>`).join('');
    } else {
        html += `<div onclick="addItemToEnc('${nome.replace(/'/g,"\\'")}','${prices[0].val}',null)" class="flex justify-between items-center p-3 border border-emerald-200 rounded-lg cursor-pointer hover:bg-emerald-50 mb-1"><span class="text-sm font-medium">Adicionar ${nome}</span><span class="text-sm font-bold text-emerald-600">${formatMoney(prices[0].val)}</span></div>`;
    }
    const catLower = normalizeStr(categoria);
    const adicionais = catalogProducts.filter(item => { const c = normalizeStr(item.categoria||''); return c.includes('adicional') && (c.includes('all') || c.includes(catLower)); });
    if (adicionais.length > 0) {
        html += `<div class="border-t pt-2 mt-2"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Extras</p><div class="grid grid-cols-2 gap-2">`;
        html += adicionais.map(ad => { const adP = parsePrices(ad.preco)[0].val; return `<div onclick="addExtraToEnc('${ad.nome.replace(/'/g,"\\'")}',${adP})" class="p-2 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 flex justify-between items-center"><span class="text-xs font-medium text-slate-600 truncate">${ad.nome}</span><span class="text-xs font-bold text-blue-500">+${formatMoney(adP)}</span></div>`; }).join('');
        html += `</div></div>`;
    }
    document.getElementById('variation-options').innerHTML = html;
    document.getElementById('variation-selector').classList.remove('hidden');
}

function editEncomenda(id) {
    const o = allData.find(x => x.id == id);
    if (!o) return;
    document.getElementById('enc-id').value = o.id;
    document.getElementById('enc-cliente').value = o.cliente;
    document.getElementById('enc-data').value = o.data_entrega ? o.data_entrega.slice(0,16) : '';
    document.getElementById('enc-entrega').value = parseMoney(o.taxa_entrega||0).toFixed(2).replace('.',',');
    document.getElementById('enc-desconto').value = parseMoney(o.desconto_total||0).toFixed(2).replace('.',',');
    document.getElementById('enc-sinal').value = parseMoney(o.sinal_pago).toFixed(2).replace('.',',');
    document.getElementById('enc-status').value = o.status;
    document.getElementById('enc-obs').value = o.obs || '';
    document.getElementById('modal-enc-title').innerHTML = '<i data-lucide="edit" class="text-blue-500"></i> Editar Encomenda';
    currentEncItems = [];
    if (o.itens) o.itens.split('|').forEach(p => { const m = p.trim().match(/^(\d+)x\s+(.+?)\s+\[R\$\s*([\d\.,]+)\]$/); if (m) { const qty=parseInt(m[1]),tot=parseMoney(m[3]); currentEncItems.push({id:Math.random().toString(36).substring(7),qty,name:m[2].trim(),unitPrice:tot/qty,total:tot}); } });
    renderEncItems();
    document.getElementById('modal-encomenda').classList.remove('hidden');
    lucide.createIcons();
}
function closeModalEnc() { document.getElementById('modal-encomenda').classList.add('hidden'); }

async function saveEncomenda() {
    const cliente = document.getElementById('enc-cliente').value.trim();
    const data_entrega = document.getElementById('enc-data').value;
    if (!cliente || !data_entrega) return toast("Cliente e Data são obrigatórios!", "#f59e0b");
    if (!currentEncItems.length) return toast("Adicione itens à encomenda!", "#f59e0b");

    const btn = document.getElementById('btn-save-enc');
    btn.disabled = true; btn.innerHTML = 'Salvando...';

    const payload = {
        cliente, data_entrega,
        itens: currentEncItems.map(i => `${i.qty}x ${i.name} [${formatMoney(i.total)}]`).join(' | '),
        total:          formatMoney(parseMoney(document.getElementById('enc-total').value)),
        taxa_entrega:   formatMoney(parseMoney(document.getElementById('enc-entrega').value)),
        desconto_total: formatMoney(parseMoney(document.getElementById('enc-desconto').value)),
        sinal_pago:     formatMoney(parseMoney(document.getElementById('enc-sinal').value)),
        status:         document.getElementById('enc-status').value,
        obs:            document.getElementById('enc-obs').value.trim(),
        tipo: 'Encomenda', pagamento: 'A Pagar', status_pagamento: 'Pendente'
    };

    const id = document.getElementById('enc-id').value;
    let error;
    if (id) { ({error} = await supabaseClient.from('pedidos').update(payload).eq('id', id)); }
    else    { ({error} = await supabaseClient.from('pedidos').insert([{...payload, id: Date.now().toString().slice(-6), data: new Date().toLocaleString("pt-BR")}])); }

    if (!error) { toast("Salvo com sucesso!", "#10b981"); closeModalEnc(); loadData(); }
    else { toast(`Erro: ${error.message}`, "#ef4444"); console.error(error); }

    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> Salvar Encomenda';
    lucide.createIcons();
}

loadCatalogAndClients().then(() => loadData());
lucide.createIcons();
</script>
</body>
