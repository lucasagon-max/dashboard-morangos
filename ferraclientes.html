<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Importador de Clientes v2.1 - Morangos Tatuí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-6 font-sans">

    <div class="bg-white max-w-2xl w-full rounded-3xl shadow-xl border border-slate-200 p-6 md:p-8">
        <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-6">
            <div class="flex items-center gap-4">
                <div class="bg-rose-100 p-3 rounded-2xl text-rose-600"><i data-lucide="users" class="w-8 h-8"></i></div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">Importador de Clientes</h1>
                    <p class="text-sm font-medium text-slate-500">Morangos Tatuí 🍓</p>
                </div>
            </div>
            <div class="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-xs font-black tracking-widest border border-slate-200">
                v2.1
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-5">
                <h3 class="font-bold text-blue-800 text-sm mb-2 flex items-center gap-2"><i data-lucide="info" class="w-4 h-4"></i> Filtro Antiduplicação (v2.1)</h3>
                <p class="text-xs text-blue-600 leading-relaxed">
                    Selecione a sua planilha <b>.csv</b>. Agora o sistema deteta e remove telefones duplicados <b>antes</b> de os enviar para o banco de dados, prevenindo erros de conflito. Acompanhe na caixa preta abaixo!
                </p>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Selecione o Ficheiro CSV do Google Sheets</label>
                <input type="file" id="csv-file" accept=".csv" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-rose-50 file:text-rose-700 hover:file:bg-rose-100 cursor-pointer border border-slate-200 rounded-xl p-1 bg-slate-50">
            </div>

            <button id="btn-import" onclick="iniciarImportacao()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-xl shadow-lg shadow-rose-200 flex justify-center items-center gap-2 transition-all active:scale-95">
                <i data-lucide="play" class="w-5 h-5"></i> INICIAR IMPORTAÇÃO
            </button>

            <!-- Caixa de Logs Visuais -->
            <div id="log-container" class="hidden mt-6">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Monitor de Progresso</h3>
                <div id="log" class="bg-slate-900 text-emerald-400 font-mono text-xs p-4 rounded-xl h-56 overflow-y-auto space-y-1 shadow-inner">
                    <!-- Logs entram aqui -->
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Conexão com o Supabase
        const SUPABASE_URL = "https://fepvxdmssoqfktqmbyzn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_d0ESFHQfYGGW3r69IpE6Jg_gKCSvHzG";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Escreve na "tela preta"
        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const p = document.createElement('p');
            p.innerText = `> ${msg}`;
            if (type === 'error') p.className = 'text-red-400 font-bold';
            if (type === 'success') p.className = 'text-emerald-400 font-bold mt-2';
            if (type === 'warning') p.className = 'text-amber-400';
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function mostrarErro(mensagem) {
            const res = document.getElementById('resultado') || document.createElement('div');
            res.id = 'resultado';
            const logContainer = document.getElementById('log-container');
            logContainer.parentNode.insertBefore(res, logContainer.nextSibling);
            
            res.className = 'mt-4 text-center text-sm font-bold p-4 rounded-xl bg-red-50 text-red-600 border border-red-200';
            res.innerHTML = `🚨 Ocorreu um erro:<br>${mensagem}`;
            res.classList.remove('hidden');

            liberarBotao();
        }

        async function iniciarImportacao() {
            const fileInput = document.getElementById('csv-file');
            const btn = document.getElementById('btn-import');
            const logContainer = document.getElementById('log-container');
            const resultadoAntigo = document.getElementById('resultado');
            if (resultadoAntigo) resultadoAntigo.remove();
            
            if (!fileInput.files.length) {
                alert("Por favor, selecione a sua planilha .csv primeiro!");
                return;
            }

            logContainer.classList.remove('hidden');
            document.getElementById('log').innerHTML = '';
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> A ler arquivo...';
            lucide.createIcons();

            addLog("A iniciar a leitura do arquivo CSV...");

            Papa.parse(fileInput.files[0], {
                header: true,
                skipEmptyLines: true,
                transformHeader: function(h) {
                    if (!h) return "ignorar_" + Math.random();
                    return String(h).replace(/^\uFEFF/, '').trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                },
                complete: async function(results) {
                    addLog(`Arquivo lido. Total de linhas brutas: ${results.data.length}`);
                    addLog("A filtrar e organizar os dados...");

                    let ignoradosPorDadosIncompletos = 0;
                    
                    // Passo 1: Extrair e limpar todos os clientes
                    const listaPreLimpeza = [];

                    for (let linha of results.data) {
                        let chaves = Object.keys(linha);
                        let chaveNome = chaves.find(k => k.includes('nome') || k.includes('cliente'));
                        let chaveTel = chaves.find(k => k.includes('telefone') || k.includes('celular') || k.includes('whatsapp') || k.includes('contato'));
                        let chaveEnd = chaves.find(k => k.includes('endereco') || k.includes('rua') || k.includes('morada'));
                        let chaveBairro = chaves.find(k => k.includes('bairro'));

                        let nomeBruto = chaveNome ? linha[chaveNome] : '';
                        let telBruto = chaveTel ? linha[chaveTel] : '';

                        if (!nomeBruto || !telBruto) {
                            ignoradosPorDadosIncompletos++;
                            continue;
                        }

                        let telLimpo = String(telBruto).replace(/\D/g, '');
                        if (telLimpo.length < 10) {
                            ignoradosPorDadosIncompletos++;
                            continue;
                        }

                        let enderecoCru = chaveEnd ? linha[chaveEnd] : '';
                        let partesEnd = enderecoCru.split(',');
                        let rua = partesEnd[0].trim();
                        let numero = '';
                        let comp = '';

                        if (partesEnd.length > 1) {
                            let resto = partesEnd.slice(1).join(',').trim();
                            let divIndex = resto.indexOf('/');
                            if (divIndex !== -1) {
                                numero = resto.substring(0, divIndex).trim();
                                comp = resto.substring(divIndex + 1).trim();
                            } else {
                                numero = resto.trim();
                            }
                        }

                        let bairro = chaveBairro ? String(linha[chaveBairro]).trim() : '';

                        listaPreLimpeza.push({
                            nome: String(nomeBruto).trim(),
                            telefone: telLimpo,
                            rua: rua,
                            numero: numero,
                            complemento: comp,
                            bairro: bairro,
                            cep: '',
                            pin_senha: '0000',
                            saldo_cashback: 0
                        });
                    }

                    // Passo 2: Deduplicação (Remove clientes com o mesmo telefone da planilha)
                    addLog("A aplicar o filtro antiduplicação de telefones...");
                    const mapDeduplicacao = new Map();
                    let duplicadosLocais = 0;

                    for (let cliente of listaPreLimpeza) {
                        if (mapDeduplicacao.has(cliente.telefone)) {
                            duplicadosLocais++;
                        }
                        // O Map vai sempre substituir pelo último cliente encontrado com aquele número
                        mapDeduplicacao.set(cliente.telefone, cliente);
                    }

                    const clientesProntos = Array.from(mapDeduplicacao.values());

                    if (ignoradosPorDadosIncompletos > 0) {
                        addLog(`${ignoradosPorDadosIncompletos} linhas ignoradas (Sem nome ou telefone inválido).`, 'warning');
                    }
                    if (duplicadosLocais > 0) {
                        addLog(`${duplicadosLocais} telefones duplicados na planilha foram mesclados!`, 'warning');
                    }
                    addLog(`Total final limpo e único: ${clientesProntos.length} clientes.`);

                    if (clientesProntos.length === 0) {
                        addLog("ERRO: Nenhum cliente válido encontrado.", 'error');
                        liberarBotao();
                        return;
                    }

                    addLog("A conectar ao banco de dados Supabase...");

                    try {
                        const chunkSize = 200;
                        let sucessoTotal = 0;

                        // Passo 3: Enviar em lotes
                        for (let i = 0; i < clientesProntos.length; i += chunkSize) {
                            const chunk = clientesProntos.slice(i, i + chunkSize);
                            addLog(`A enviar lote ${Math.ceil((i+1)/chunkSize)}... (${chunk.length} clientes)`);
                            
                            const { error } = await supabaseClient.from('clientes').upsert(chunk, { onConflict: 'telefone' });
                            
                            if (error) {
                                addLog(`ERRO DO BANCO NO LOTE ${Math.ceil((i+1)/chunkSize)}: ${error.message}`, 'error');
                                throw error;
                            }
                            sucessoTotal += chunk.length;
                        }

                        addLog("🎉 TRANSFERÊNCIA CONCLUÍDA COM SUCESSO!", 'success');
                        addLog(`Total inserido/atualizado: ${sucessoTotal} clientes.`, 'success');
                        
                        btn.innerHTML = '<i data-lucide="check-check" class="w-5 h-5"></i> IMPORTAÇÃO FINALIZADA';
                        btn.classList.replace('bg-rose-600', 'bg-emerald-600');
                        btn.classList.replace('hover:bg-rose-700', 'hover:bg-emerald-700');
                        btn.disabled = true;
                        lucide.createIcons();

                        const resFinal = document.createElement('div');
                        resFinal.className = 'mt-4 text-center text-sm font-bold p-4 rounded-xl bg-emerald-50 text-emerald-600 border border-emerald-200';
                        resFinal.innerHTML = `🎉 Sucesso! Seus clientes já podem fazer login no App.`;
                        document.getElementById('log-container').parentNode.appendChild(resFinal);

                    } catch (err) {
                        addLog(`MIGRAÇÃO INTERROMPIDA: ${err.message}`, 'error');
                        liberarBotao();
                    }
                },
                error: function(err) {
                    addLog(`ERRO NA LEITURA DO CSV: ${err.message}`, 'error');
                    liberarBotao();
                }
            });
        }

        function liberarBotao() {
            const btn = document.getElementById('btn-import');
            btn.innerHTML = '<i data-lucide="rotate-ccw" class="w-5 h-5"></i> TENTAR NOVAMENTE';
            btn.disabled = false;
            lucide.createIcons();
        }
    </script>
</body>
</html>
