<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Comandas - Supabase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SDK DO SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); }
        .logo-img { max-height: 50px; width: auto; object-fit: contain; }

        /* Card cores por tipo */
        .comanda-card { background: #fff; position: relative; border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s; }
        .comanda-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .bar-mesa    { background: #3b82f6; }
        .bar-balcao  { background: #f97316; }
        .bar-delivery{ background: #10b981; }
        .bar-default { background: #8b5cf6; }

        /* Animações (SÓ aplicadas a novos itens) */
        .card-new { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes popIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
        
        .payment-pill { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
        
        .variation-badge { cursor:pointer; transition:all 0.2s; }
        .variation-badge:hover { background-color:#dbeafe; border-color:#3b82f6; }
        
        /* Indicador Tempo Real */
        .live-dot { animation: pulseGreen 2s infinite; }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="p-4 md:p-6" onclick="enableAudioContext()">

    <!-- ⚙️ CONFIGURAÇÃO DO SUPABASE -->
    <script>
        const SUPABASE_URL = "https://fepvxdmssoqfktqmbyzn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_d0ESFHQfYGGW3r69IpE6Jg_gKCSvHzG";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <!-- BARRA DE NAVEGAÇÃO -->
    <nav class="bg-white shadow-sm rounded-2xl px-6 py-4 mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border border-slate-200">
        <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
            <img src="https://lucasagon-max.github.io/dashboard-morangos/logo.png" alt="Logotipo" class="logo-img hover:scale-105 transition-transform duration-300" onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden')">
            <h1 id="logo-text" class="hidden text-2xl font-bold text-slate-800 tracking-tight">Morangos<span class="text-red-600">Tatuí</span></h1>
        </div>

        <!-- Busca -->
        <div class="flex-1 max-w-md w-full relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="search" class="w-4 h-4 text-slate-400"></i></div>
            <input type="text" id="search-comanda" oninput="filterComandas()" placeholder="Buscar por Nº ou Cliente..." class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block pl-10 p-2.5 outline-none transition-all">
        </div>

        <!-- Status + Botão -->
        <div class="flex items-center gap-2 sm:gap-4">
            <div class="hidden sm:flex items-center gap-2 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100" id="status-badge">
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full live-dot" id="status-dot"></div>
                <span class="text-xs font-bold text-emerald-700" id="status-text">Conectando...</span>
            </div>

            <!-- Botão de Som -->
            <button onclick="toggleSound()" class="bg-white hover:bg-slate-50 p-2.5 rounded-xl transition-colors shadow-sm border border-slate-200 active:scale-95 flex items-center justify-center" title="Ativar/Desativar Som">
                <span id="icon-muted"><i data-lucide="volume-x" class="w-5 h-5 text-slate-400 transition-colors"></i></span>
                <span id="icon-unmuted" class="hidden"><i data-lucide="volume-2" class="w-5 h-5 text-green-500 transition-colors"></i></span>
            </button>

            <button onclick="manualRefresh()" class="bg-slate-800 text-white px-4 sm:px-5 py-2.5 rounded-xl flex items-center gap-2 hover:bg-slate-700 active:scale-95 transition-all shadow-md text-sm font-bold group">
                <i data-lucide="refresh-cw" class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500"></i>
                <span class="hidden sm:inline">Sincronizar</span>
            </button>
        </div>
    </nav>

    <!-- Contadores rápidos -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="stats-bar">
        <div class="bg-white rounded-xl px-4 py-3 border border-slate-200 flex items-center gap-3">
            <div class="bg-blue-50 p-2 rounded-lg"><i data-lucide="clipboard-list" class="w-4 h-4 text-blue-500"></i></div>
            <div><p class="text-[10px] text-slate-400 uppercase font-bold">Abertas</p><p class="text-xl font-black text-slate-800" id="count-total">0</p></div>
        </div>
        <div class="bg-white rounded-xl px-4 py-3 border border-slate-200 flex items-center gap-3">
            <div class="bg-yellow-50 p-2 rounded-lg"><i data-lucide="clock" class="w-4 h-4 text-yellow-500"></i></div>
            <div><p class="text-[10px] text-slate-400 uppercase font-bold">Pendentes</p><p class="text-xl font-black text-slate-800" id="count-pendente">0</p></div>
        </div>
        <div class="bg-white rounded-xl px-4 py-3 border border-slate-200 flex items-center gap-3">
            <div class="bg-red-50 p-2 rounded-lg"><i data-lucide="banknote" class="w-4 h-4 text-red-500"></i></div>
            <div><p class="text-[10px] text-slate-400 uppercase font-bold">A Pagar</p><p class="text-xl font-black text-slate-800" id="count-apagar">0</p></div>
        </div>
        <div class="bg-white rounded-xl px-4 py-3 border border-slate-200 flex items-center gap-3">
            <div class="bg-green-50 p-2 rounded-lg"><i data-lucide="trending-up" class="w-4 h-4 text-green-500"></i></div>
            <div><p class="text-[10px] text-slate-400 uppercase font-bold">Total Aberto</p><p class="text-xl font-black text-slate-800" id="count-valor">R$ 0</p></div>
        </div>
    </div>

    <div id="comandas-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-10"></div>
    <div id="empty-state" class="hidden text-center py-20 text-slate-400">
        <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 opacity-30"></i>
        <p class="font-bold text-lg">Nenhuma comanda aberta</p>
        <p class="text-sm">Os novos pedidos aparecerão aqui automaticamente.</p>
    </div>

    <!-- MODAL EDIÇÃO -->
    <div id="edit-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center modal-overlay p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-100 p-2 rounded-lg text-blue-600"><i data-lucide="edit-3" class="w-5 h-5"></i></div>
                    <div><h3 class="font-bold text-lg text-slate-800">Editar Pedido</h3><p class="text-xs text-slate-500 font-medium">ID: <span id="edit-modal-id"></span></p></div>
                </div>
                <button onclick="closeEditModal()" class="
