<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico | Morangos Tatuí</title>
    <link rel="icon" href="https://ferramentas.morangostatui.com.br/favicon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chart-container { position: relative; height: 260px; width: 100%; }
        .truncate-name { max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tab-active { border-bottom: 3px solid #dc2626; color: #dc2626; }
        .btn-filter-active { background-color: #dc2626 !important; color: white !important; }
        #main-content { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 px-4">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-2xl text-center space-y-6">
            <img src="https://ferramentas.morangostatui.com.br/logo.png" alt="Morangos Tatuí" class="h-20 mx-auto">
            <h2 class="text-xl font-black text-slate-900">Acesso Restrito</h2>
            <input type="password" id="password-input" placeholder="Senha" class="w-full px-4 py-3 bg-slate-100 rounded-xl outline-none text-center font-bold">
            <button onclick="checkAuth()" class="w-full py-3 bg-red-600 text-white rounded-xl font-bold">Entrar</button>
            <p id="login-error" class="text-red-500 text-[10px] font-bold hidden">SENHA INCORRETA</p>
        </div>
    </div>

    <div id="main-content">
        <header class="bg-white border-b sticky top-0 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 h-16 md:h-20 flex justify-between items-center">
                <img src="https://ferramentas.morangostatui.com.br/logo.png" class="h-10 md:h-14">
                <div class="flex gap-6">
                    <button onclick="switchTab('geral')" id="tab-geral" class="tab-btn pb-2 text-sm font-bold tab-active">Visão Geral</button>
                    <button onclick="switchTab('avancada')" id="tab-avancada" class="tab-btn pb-2 text-sm font-bold">Inteligência</button>
                </div>
                <button onclick="logout()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 px-3 py-1 rounded-lg">Sair</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
            
            <!-- ABA GERAL -->
            <section id="view-geral" class="space-y-6">
                <div class="flex flex-col lg:flex-row justify-between gap-4 bg-white p-4 rounded-3xl border">
                    <div class="flex flex-wrap gap-2">
                        <button onclick="definirPeriodo('hoje', 'geral')" class="btn-periodo-geral px-4 py-2 bg-white border rounded-xl text-xs font-bold btn-filter-active" data-id="hoje">Hoje</button>
                        <button onclick="definirPeriodo('ontem', 'geral')" class="btn-periodo-geral px-4 py-2 bg-white border rounded-xl text-xs font-bold" data-id="ontem">Ontem</button>
                        <button onclick="definirPeriodo('mes', 'geral')" class="btn-periodo-geral px-4 py-2 bg-white border rounded-xl text-xs font-bold" data-id="mes">Este Mês</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 text-center">
                    <div class="bg-white p-5 rounded-3xl border shadow-sm"><p class="text-slate-400 text-[10px] font-black uppercase mb-1">Bruto</p><h2 id="total-bruto" class="text-2xl font-black">R$ 0,00</h2></div>
                    <div class="bg-white p-5 rounded-3xl border shadow-sm border-l-red-500 border-l-4"><p class="text-red-400 text-[10px] font-black uppercase mb-1">Taxas</p><h2 id="total-taxas" class="text-2xl font-black text-red-600">R$ 0,00</h2></div>
                    <div class="bg-white p-5 rounded-3xl border shadow-sm border-l-emerald-500 border-l-4"><p class="text-emerald-400 text-[10px] font-black uppercase mb-1">Líquido</p><h2 id="total-liquido" class="text-2xl font-black text-emerald-600">R$ 0,00</h2></div>
                    <div class="bg-slate-900 p-5 rounded-3xl border shadow-sm"><p class="text-slate-400 text-[10px] font-black uppercase mb-1 opacity-70 text-white">Vendas</p><h2 id="count-vendas" class="text-2xl font-black text-white">0</h2></div>
                </div>

                <!-- Gráficos -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white p-6 rounded-3xl border shadow-sm">
                        <h3 class="text-xs font-black uppercase text-slate-400 mb-4 italic">Origem das Vendas (Onde vendemos?)</h3>
                        <div class="chart-container"><canvas id="chartOrigem"></canvas></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <h3 class="text-xs font-black uppercase text-slate-400 mb-4 text-center">Meios de Pagamento</h3>
                        <div class="chart-container"><canvas id="chartCategorias"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                    <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-700 text-sm italic" id="label-periodo-geral">HOJE</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                                <tr>
                                    <th class="px-6 py-4">Hora</th>
                                    <th class="px-6 py-4">Cliente</th>
                                    <th class="px-6 py-4">Origem</th>
                                    <th class="px-6 py-4">Método</th>
                                    <th class="px-6 py-4 text-right">Líquido</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-corpo" class="text-[11px] divide-y divide-slate-50 bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- ABA AVANÇADA (HEATMAP) -->
            <section id="view-avancada" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6">Mapa de Calor (Horários de Pico)</h3>
                    <div class="overflow-x-auto">
                        <div class="min-w-[800px]">
                            <div id="heatmap-header" class="grid grid-cols-[100px_repeat(24,1fr)] mb-2"></div>
                            <div id="heatmap-body" class="space-y-1"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SENHA_MESTRA = "morango2026";
        const SUPABASE_URL = 'https://fepvxdmssoqfktqmbyzn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_d0ESFHQfYGGW3r69IpE6Jg_gKCSvHzG';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        Chart.register(ChartDataLabels);
        let chOri = null, chCat = null;

        function checkAuth() {
            if(document.getElementById('password-input').value === SENHA_MESTRA) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').style.display = 'block';
                sessionStorage.setItem('auth_morangos', 'true');
                definirPeriodo('hoje', 'geral');
            } else { document.getElementById('login-error').classList.remove('hidden'); }
        }

        function logout() { sessionStorage.removeItem('auth_morangos'); window.location.reload(); }

        function switchTab(tab) {
            document.getElementById('view-geral').classList.toggle('hidden', tab !== 'geral');
            document.getElementById('view-avancada').classList.toggle('hidden', tab !== 'avancada');
            document.getElementById('tab-geral').classList.toggle('tab-active', tab === 'geral');
            document.getElementById('tab-avancada').classList.toggle('tab-active', tab === 'avancada');
            if(tab === 'avancada') definirPeriodo('mes', 'avancada');
        }

        async function definirPeriodo(tipo, tab) {
            let i = new Date(), f = new Date();
            i.setHours(0,0,0,0); f.setHours(23,59,59,999);
            if(tipo === 'ontem'){ i.setDate(i.getDate()-1); f.setDate(f.getDate()-1); }
            else if(tipo === 'mes'){ i.setDate(1); }

            document.querySelectorAll(`.btn-periodo-${tab}`).forEach(b => b.classList.toggle('btn-filter-active', b.dataset.id === tipo));
            
            const { data } = await sb.from('vendas_mercado_pago').select('*').gte('data_venda', i.toISOString()).lte('data_venda', f.toISOString()).order('data_venda', {ascending: true});
            if(data) tab === 'geral' ? renderGeral(data) : renderAvancado(data);
        }

        function renderGeral(vendas) {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';
            let b = 0, t = 0, l = 0, cats = {}, origens = {};

            vendas.forEach(v => {
                b += v.valor_bruto; t += v.taxa_mp; l += v.valor_liquido;
                cats[v.metodo_pagamento] = (cats[v.metodo_pagamento] || 0) + v.valor_bruto;
                const ori = v.origem_venda || "Link / Online";
                origens[ori] = (origens[ori] || 0) + v.valor_bruto;

                corpo.insertAdjacentHTML('afterbegin', `
                    <tr class="hover:bg-slate-50 transition-colors border-b">
                        <td class="px-6 py-4 text-slate-400 italic">${new Date(v.data_venda).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</td>
                        <td class="px-6 py-4 font-bold uppercase truncate-name">${v.nome_pagador || 'N/A'}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase ${ori.includes('Maquininha') ? 'bg-blue-100 text-blue-700' : ori.includes('Tap') ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'}">
                                ${ori}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-black text-slate-400 uppercase text-[9px]">${v.metodo_pagamento.replace('_',' ')}</td>
                        <td class="px-6 py-4 text-right font-black text-emerald-600 italic">R$ ${v.valor_liquido.toFixed(2)}</td>
                    </tr>`);
            });

            document.getElementById('total-bruto').innerText = b.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('total-taxas').innerText = t.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('total-liquido').innerText = l.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('count-vendas').innerText = vendas.length;

            if(chOri) chOri.destroy();
            chOri = new Chart(document.getElementById('chartOrigem'), {
                type:'bar', data:{labels:Object.keys(origens), datasets:[{data:Object.values(origens), backgroundColor:['#3b82f6','#8b5cf6','#94a3b8'], borderRadius:10}]},
                options: {maintainAspectRatio:false, plugins:{legend:{display:false}, datalabels:{anchor:'end', align:'top', font:{weight:'bold'}, formatter: (v) => 'R$'+v.toFixed(0)}}}
            });

            if(chCat) chCat.destroy();
            chCat = new Chart(document.getElementById('chartCategorias'), {
                type:'doughnut', data:{labels:Object.keys(cats), datasets:[{data:Object.values(cats), backgroundColor:['#ef4444','#3b82f6','#10b981','#f59e0b'], borderWidth:0}]},
                options: {maintainAspectRatio:false, cutout:'70%', plugins:{legend:{position:'bottom', labels:{font:{size:9, weight:'bold'}}}, datalabels:{display:false}}}
            });
        }

        function renderAvancado(vendas) {
            const h = document.getElementById('heatmap-header'), b = document.getElementById('heatmap-body');
            h.innerHTML = '<div></div>' + Array.from({length: 24}).map((_, i) => `<div class="text-[9px] font-bold text-slate-400 text-center">${i}h</div>`).join('');
            b.innerHTML = '';
            const dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            const m = Array.from({length: 7}, () => Array(24).fill(0));
            let max = 0;
            vendas.forEach(v => { const d = new Date(v.data_venda); m[d.getDay()][d.getHours()] += v.valor_bruto; if(m[d.getDay()][d.getHours()] > max) max = m[d.getDay()][d.getHours()]; });

            m.forEach((l, i) => {
                let row = `<div class="grid grid-cols-[100px_repeat(24,1fr)] items-center"><div class="text-[9px] font-black uppercase text-slate-400 border-r pr-2 h-full flex items-center">${dias[i]}</div>`;
                l.forEach(v => {
                    const op = max ? (v/max) : 0;
                    row += `<div class="heatmap-cell h-7 border-white border-[0.5px] text-[7px] flex items-center justify-center font-bold" style="background:${v > 0 ? `rgba(220, 38, 38, ${0.1 + (op * 0.9)})` : '#f8fafc'}; color:${op > 0.5 ? '#fff' : '#cbd5e1'}" title="R$ ${v.toFixed(2)}">${v > 0 ? 'R$'+v.toFixed(0) : ''}</div>`;
                });
                b.innerHTML += row + '</div>';
            });
        }

        window.onload = () => { if(sessionStorage.getItem('auth_morangos') === 'true') { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('main-content').style.display='block'; definirPeriodo('hoje','geral'); } };
    </script>
</body>
</html>
