<div id="toast-container" class="fixed bottom-6 right-6 z-[100] pointer-events-none"></div>

<script>
const CLIENT_ID='781310015266-iff0bmklrbkv3mt6no32gel47tfs3jeu.apps.googleusercontent.com';
const SHEET_ID='1cyM1DI29ob_hF3BomDazojTo-nn3j8kJowpbqh7R8Tg';
const SCOPES='https://www.googleapis.com/auth/spreadsheets.readonly';

let tokenClient, accessToken=null, charts={}, currentData=null;
let RAW_MOV=[], RAW_FEC=[], RAW_PARC=[], RAW_CART=[], RAW_COMP=[];
let currentFilter='all', customFrom=null, customTo=null;

const R=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const num=v=>{if(!v)return 0; return parseFloat(String(v).replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.'))||0;};
const COLORS={ brand:'#e11d48', dark:'#0f172a', gray:'#94a3b8', green:'#10b981', amber:'#f59e0b', blue:'#3b82f6' };
const BF={family:'"DM Sans", sans-serif', weight:'500'};
const AX={grid:{display:false}, ticks:{font:BF, color:'#94a3b8', size:10}};

function getGradient(ctx, color) {
  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, color);
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  return gradient;
}

function notify(msg, type='info') {
  const toast = document.createElement('div');
  const colors = { info:'bg-slate-800', success:'bg-emerald-600', error:'bg-rose-600' };
  toast.className = `${colors[type]} text-white px-6 py-3 rounded-xl shadow-2xl text-sm font-bold mb-3 pointer-events-auto fade-in flex items-center gap-2`;
  toast.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'info'}" class="w-4 h-4"></i> ${msg}`;
  const container = document.getElementById('toast-container');
  if(container) {
    container.appendChild(toast);
    lucide.createIcons();
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(10px)';
      setTimeout(() => toast.remove(), 400);
    }, 3000);
  }
}

// ── AUTH & DATA ──
function loadGIS(){
  const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
  s.onload=()=> tokenClient=google.accounts.oauth2.initTokenClient({ client_id:CLIENT_ID, scope:SCOPES, callback: async r=>{accessToken=r.access_token; await loadAllData();}});
  document.head.appendChild(s);
}
function signIn(){ tokenClient.requestAccessToken({prompt:'consent'}); }
async function fetchSheet(name){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  const j=await r.json(); 
  if(!j.values) return [];
  const [h,...rows]=j.values;
  return rows.map(r=>{const o={}; h.forEach((k,i)=>o[k]=r[i]??''); return o;});
}
async function loadAllData(){
  showLoading('Buscando dados...');
  try {
    [RAW_MOV, RAW_FEC, RAW_PARC, RAW_CART, RAW_COMP] = await Promise.all([fetchSheet('Movimentacoes'), fetchSheet('Fechamento'), fetchSheet('Parcelas'), fetchSheet('Cartoes_Emprestimos'), fetchSheet('Compras_Cartao')]);
    renderAll(); showDashboard(); notify("Dados sincronizados!", 'success');
  } catch(e) { notify("Erro ao carregar dados: " + e.message, 'error'); }
}

// ── FILTROS ──
function parseDate(v){
  if(!v)return null; const s=String(v).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);}
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return new Date(s.substring(0,10));
  return new Date(s);
}
function getRange(){
  const now=new Date(); const td=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(currentFilter==='today') return {f:td, t:td};
  if(currentFilter==='yesterday'){ const y=new Date(td); y.setDate(td.getDate()-1); return {f:y,t:y}; }
  if(currentFilter==='7days'){ const f=new Date(td); f.setDate(td.getDate()-6); return {f:f,t:td}; }
  if(currentFilter==='week'){ const day=td.getDay()||7; const m=new Date(td); m.setDate(td.getDate()-day+1); const s=new Date(m); s.setDate(m.getDate()+6); return{f:m,t:s}; }
  if(currentFilter==='month') return {f:new Date(td.getFullYear(),td.getMonth(),1), t:new Date(td.getFullYear(),td.getMonth()+1,0)};
  if(currentFilter==='custom' && customFrom) return {f:customFrom, t:customTo};
  return {f:new Date(2000,0,1), t:new Date(2100,0,1)};
}
function filterRows(rows,field){
  const {f,t}=getRange();
  return rows.filter(r=>{
    const d=parseDate(r[field]); if(!d)return false;
    const day=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    return day>=f && day<=t;
  });
}

// ── PROCESSAMENTO ──
function processData(mov, fec, parc, cart, comp){
  const k = {
    vBruto: mov.filter(r=>r.Categoria==='Vendas').reduce((a,r)=>a+num(r.Valor),0),
    vLiq: mov.filter(r=>r.Categoria==='Vendas').reduce((a,r)=>a+num(r.Valor_Liquido||r.Valor),0),
    tEnt: fec.reduce((a,r)=>a+num(r.Total_Entradas),0),
    tSai: fec.reduce((a,r)=>a+num(r.Total_Saidas),0),
    saldo: fec.length ? num(fec[fec.length-1].Saldo_Real) : 0
  };
  k.margem = k.vBruto > 0 ? ((k.vBruto - k.tSai) / k.vBruto) * 100 : 0;
  k.lucroEst = k.vLiq - k.tSai;

  const vMap={}; 
  mov.filter(r=>r.Categoria==='Vendas').forEach(r=>{ 
    const d=parseDate(r.Data); 
    if(d){ 
      const k=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); 
      vMap[k]=(vMap[k]||0)+num(r.Valor); 
    }
  });

  const saiMap={}; mov.filter(r=>r.Tipo==='Saída').forEach(r=>{ const c=r.Categoria||'Outros'; saiMap[c]=(saiMap[c]||0)+num(r.Valor); });
  const saidas=Object.entries(saiMap).sort((a,b)=>b[1]-a[1]).map(([c,v])=>({c,v}));

  const fpMap={}, fpLiq={}; mov.filter(r=>r.Tipo==='Entrada').forEach(r=>{ const fp=r.Forma_Pagamento||'Outros'; fpMap[fp]=(fpMap[fp]||0)+num(r.Valor); fpLiq[fp]=(fpLiq[fp]||0)+num(r.Valor_Liquido||r.Valor); });
  const entFP=Object.entries(fpMap).sort((a,b)=>b[1]-a[1]).map(([fp,v])=>({fp, bruto:v, liq:fpLiq[fp]}));

  const cartMap = {};
  cart.forEach(c => { if(c.ID_Cartao) cartMap[c.ID_Cartao] = { ...c, faturas: {}, totalPendente: 0, vencimento: c.Vencimento_Dia || '--' }; });
  
  const boletos = [];

  const ordenarMeses = (arr) => {
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    return arr.sort((a, b) => {
        const [mA, aA] = a.split(' - '); const [mB, aB] = b.split(' - ');
        if(aA !== aB) return aA - aB;
        return meses.findIndex(m => mA.includes(m)) - meses.findIndex(m => mB.includes(m));
    });
  };

  parc.filter(p => (p.Status||'').toLowerCase().includes('pend')).forEach(p => {
    const cp = comp.find(c => c.ID_Compra === p.ID_Compra_Ref);
    const idC = cp ? cp.Cartao : 'BOLETO';
    const mes = p.Fatura_Mes || 'Sem Data';
    const v = num(p.Valor_Parcela);
    const venc = p.Data_Vencimento || '--';

    if(idC === 'BOLETO' || !cartMap[idC]) {
      boletos.push({ desc: p.Descricao_Parcela || cp?.Descricao, valor: v, vencimento: venc, mes });
    } else {
      if(!cartMap[idC].faturas[mes]) cartMap[idC].faturas[mes] = { total: 0, itens: [] };
      cartMap[idC].faturas[mes].total += v;
      cartMap[idC].totalPendente += v;
      cartMap[idC].faturas[mes].itens.push({ desc: cp?.Descricao || p.Descricao_Parcela, valor: v, vencimento: venc });
    }
  });

  const vendasD = Object.entries(vMap).sort((a,b)=>{
    const [dA,mA]=a[0].split('/'); const [dB,mB]=b[0].split('/');
    return new Date(2026,mA-1,dA) - new Date(2026,mB-1,dB);
  }).map(([d,v])=>({d,v}));

  return { k, vendasDia: vendasD, saidas, entFP, fec, cartoes: Object.values(cartMap), boletos, ordenarMeses };
}

// ── RENDER ──
function renderAll(){
  Object.values(charts).forEach(c=>c.destroy());
  currentData = processData(filterRows(RAW_MOV,'Data'), filterRows(RAW_FEC,'Data_Caixa'), RAW_PARC, RAW_CART, RAW_COMP);
  const d = currentData;
  document.getElementById('periodLabel').textContent = currentFilter.toUpperCase();
  
  buildVisao(d);
  buildCaixa(d);
  buildSaidas(d);
  buildPagamentos(d);
  buildParcelas(d);
  buildBoletos(d);
  lucide.createIcons();
}

function secTitle(t, i) { return `<div class="font-sans text-xl font-bold text-slate-800 flex items-center gap-3 mb-8 border-b border-slate-100 pb-4"><div class="w-10 h-10 rounded-xl bg-brand-50 text-brand-600 flex items-center justify-center"><i data-lucide="${i}" class="w-5 h-5"></i></div> ${t}</div>`; }

function buildVisao(d){
  document.getElementById('tab-visao').innerHTML = `
    ${secTitle('Resumo Estratégico', 'bar-chart-3')}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-10 stagger-in">
      <div class="kpi-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
        <div class="flex justify-between items-start mb-4">
          <div class="w-10 h-10 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
          <span class="text-[10px] font-black text-emerald-500 bg-emerald-50 px-2 py-1 rounded-md">BRUTO</span>
        </div>
        <div class="text-xs font-bold text-slate-400 uppercase tracking-tight mb-1">Faturamento</div>
        <div class="text-2xl font-black text-slate-900">${R(d.k.vBruto)}</div>
      </div>
      <div class="kpi-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
        <div class="flex justify-between items-start mb-4">
          <div class="w-10 h-10 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center"><i data-lucide="target" class="w-5 h-5"></i></div>
          <span class="text-[10px] font-black text-blue-500 bg-blue-50 px-2 py-1 rounded-md">${d.k.margem.toFixed(1)}% MARGEM</span>
        </div>
        <div class="text-xs font-bold text-slate-400 uppercase tracking-tight mb-1">Lucro Estimado</div>
        <div class="text-2xl font-black text-slate-900 ${d.k.lucroEst < 0 ? 'text-rose-600':'text-slate-900'}">${R(d.k.lucroEst)}</div>
      </div>
      <div class="kpi-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">

function buildCaixa(d){

function buildSaidas(d){

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      </div>

function buildPagamentos(d){

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

       <div class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm">${rows}</div>
    </div>
  `;

function buildParcelas(d){
  const cartGradients = {'CARD01':'card-gradient-red','CARD02':'card-gradient-dark','CARD03':'card-gradient-slate','LCRED01':'card-gradient-slate'};
  const cartoesHtml = d.cartoes.filter(c => c.totalPendente > 0).map(c => {
    const grad = cartGradients[c.ID_Cartao] || 'bg-slate-500';
    const meses = d.ordenarMeses(Object.keys(c.faturas));
    const faturasHtml = meses.map(m => {
      const fat = c.faturas[m];
      const uid = `fat_${c.ID_Cartao}_${m.replace(/\s/g,'')}`;
      return `
        <div class="border-b last:border-0">
          <button onclick="toggleParcelas('${uid}')" class="w-full flex justify-between p-4 text-sm hover:bg-slate-50">
            <span class="font-bold text-slate-700">${m}</span>
            <div class="flex items-center gap-2 font-black text-slate-900">${R(fat.total)} <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i></div>
          </button>
          <div id="${uid}" class="hidden bg-slate-50 px-4 pb-3">
            ${fat.itens.map(i => `<div class="flex justify-between py-1.5 text-xs border-b border-slate-200 last:border-0"><div class="flex flex-col"><span class="text-slate-700 font-medium">${i.desc}</span><span class="text-[10px] text-slate-400">Venc: ${i.vencimento}</span></div><span class="font-bold text-slate-700">${R(i.valor)}</span></div>`).join('')}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="bg-white border border-slate-100 rounded-[2rem] overflow-hidden shadow-sm flex flex-col hover:shadow-xl transition-all duration-300">
         <div class="${grad} p-6 text-white relative">
          <div class="card-chip mb-8"></div>
          <div class="flex justify-between items-end mb-2">
            <div><div class="text-[9px] opacity-70 uppercase tracking-widest font-bold mb-1">Titular/Banco</div><div class="text-lg font-black tracking-tight">${c.Nome_Conta}</div></div>
            <div class="text-right"><div class="text-[9px] opacity-70 uppercase tracking-widest font-bold mb-1">Vencimento Dia</div><div class="text-xl font-black">${c.vencimento}</div></div>
          </div>
          <div class="mt-4 flex justify-between items-center bg-white/10 rounded-xl p-3 border border-white/10">
             <span class="text-xs font-bold opacity-80">Comprometido</span>
             <span class="text-lg font-black">${R(c.totalPendente)}</span>
          </div>
        </div>
        <div class="flex-1 bg-white p-2">${faturasHtml}</div>
      </div>`;
  }).join('');

  document.getElementById('tab-parcelas').innerHTML = `
    ${secTitle('Gestão de Cartões de Crédito', 'credit-card')}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${cartoesHtml}</div>
  `;
}

function buildBoletos(d){
  const rows = d.boletos.sort((a,b) => parseDate(a.vencimento) - parseDate(b.vencimento)).map(b => `
    <div class="flex justify-between items-center p-5 bg-white border border-slate-100 rounded-2xl mb-3 shadow-sm hover:border-brand-500 transition-colors">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center"><i data-lucide="barcode" class="w-5 h-5"></i></div>
        <div>
          <div class="text-sm font-black text-slate-900">${b.desc || 'Boleto sem descrição'}</div>
          <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Vencimento: <span class="text-brand-600">${b.vencimento}</span></div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-lg font-black text-slate-900">${R(b.valor)}</div>
        <div class="text-[9px] font-bold text-slate-400 uppercase">${b.mes}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('tab-boletos').innerHTML = `
    ${secTitle('Ambiente de Boletos Pendentes', 'barcode')}
    <div class="max-w-3xl mx-auto">${rows || '<div class="text-center py-20 text-slate-400">Nenhum boleto pendente encontrado.</div>'}</div>
  `;
}

// ── RELATÓRIOS ──
function openReportModal() {
  const d = currentData;
  const timestamp = new Date().toLocaleDateString('pt-BR');
  document.getElementById('reportTimestamp').textContent = timestamp;
  
  // Pegar todos os compromissos do mês atual (baseado no filtro ou data atual)
  const agora = new Date();
  const mesAtualNome = agora.toLocaleDateString('pt-BR', { month: 'long' });
  const faturasMes = [];
  
  // Coletar faturas de cartões
  d.cartoes.forEach(c => {
    Object.keys(c.faturas).forEach(m => {
       if(m.toLowerCase().includes(mesAtualNome.toLowerCase())) {
         faturasMes.push({ tipo: 'Cartão', desc: c.Nome_Conta, valor: c.faturas[m].total, venc: `Dia ${c.vencimento}` });
       }
    });
  });

  // Coletar boletos do mês
  d.boletos.forEach(b => {
    if(b.mes.toLowerCase().includes(mesAtualNome.toLowerCase())) {
      faturasMes.push({ tipo: 'Boleto', desc: b.desc, valor: b.valor, venc: b.vencimento });
    }
  });

  const content = `
    <div class="space-y-8">
      <div class="flex justify-between items-start border-b pb-6">
        <div>
          <h3 class="text-2xl font-black text-slate-800">Morangos Tatuí</h3>
          <p class="text-slate-500 font-medium italic">Gestão Estratégica · Relatório ${currentFilter.toUpperCase()}</p>
        </div>
        <img src="https://ferramentas.morangostatui.com.br/logo.png" class="w-16 h-16 object-contain">
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
          <div class="text-[9px] font-black text-slate-400 uppercase mb-1">Faturamento</div>
          <div class="text-lg font-black text-slate-900">${R(d.k.vBruto)}</div>
        </div>
        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
          <div class="text-[9px] font-black text-slate-400 uppercase mb-1">Lucro Est.</div>
          <div class="text-lg font-black text-emerald-600">${R(d.k.lucroEst)}</div>
        </div>
        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
          <div class="text-[9px] font-black text-slate-400 uppercase mb-1">Despesas</div>
          <div class="text-lg font-black text-rose-600">${R(d.k.tSai)}</div>
        </div>
        <div class="bg-slate-900 p-4 rounded-2xl shadow-xl">
          <div class="text-[9px] font-black text-slate-400 uppercase mb-1">Saldo Real</div>
          <div class="text-lg font-black text-white">${R(d.k.saldo)}</div>
        </div>
      </div>

      <div>
        <h4 class="text-sm font-black text-slate-800 uppercase mb-4 flex items-center gap-2 border-l-4 border-brand-600 pl-3">
          Compromissos e Vencimentos do Mês
        </h4>
        <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
          <table class="w-full text-left text-xs">
            <thead class="bg-slate-50 text-slate-400 font-black uppercase">
              <tr><th class="p-4">Tipo</th><th class="p-4">Descrição</th><th class="p-4">Vencimento</th><th class="p-4 text-right">Valor</th></tr>
            </thead>
            <tbody class="divide-y">
              ${faturasMes.map(f => `
                <tr>
                  <td class="p-4 font-bold text-brand-600">${f.tipo}</td>
                  <td class="p-4 font-medium text-slate-700">${f.desc}</td>
                  <td class="p-4 text-slate-500 font-bold">${f.venc}</td>
                  <td class="p-4 text-right font-black text-slate-900">${R(f.valor)}</td>

              `).join('')}
              ${faturasMes.length === 0 ? '<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">Nenhum compromisso pendente registrado para este mês.</td></tr>' : ''}

      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <h4 class="text-sm font-black text-slate-800 uppercase mb-4 flex items-center gap-2">Maiores Saídas</h4>

function closeReportModal() {
  document.getElementById('modalReport').classList.add('hidden');
}

function copyReportForAI() {
  const d = currentData;
  const agora = new Date();
  const mesAtualNome = agora.toLocaleDateString('pt-BR', { month: 'long' });
  
  const compromissos = [];
  d.cartoes.forEach(c => {
    Object.keys(c.faturas).forEach(m => {
       if(m.toLowerCase().includes(mesAtualNome.toLowerCase())) compromissos.push(`${c.Nome_Conta} (Cartão): ${R(c.faturas[m].total)} - Vencimento: Dia ${c.vencimento}`);
    });
  });
  d.boletos.forEach(b => {
    if(b.mes.toLowerCase().includes(mesAtualNome.toLowerCase())) compromissos.push(`${b.desc} (Boleto): ${R(b.valor)} - Vencimento: ${b.vencimento}`);
  });

  const prompt = `RELATÓRIO FINANCEIRO EXECUTIVO - MORANGOS TATUÍ
PERÍODO: ${currentFilter.toUpperCase()}
ESTADO DO CAIXA: ${R(d.k.saldo)}

--- COMPROMISSOS DO MÊS (${mesAtualNome.toUpperCase()}) ---
${compromissos.length ? compromissos.join('\n') : 'Nenhum compromisso mapeado.'}

--- PERFORMANCE ---
Bruto: ${R(d.k.vBruto)}
Líquido: ${R(d.k.vLiq)}
Margem: ${d.k.margem.toFixed(2)}%
Lucro Estimado: ${R(d.k.lucroEst)}

--- DISTRIBUIÇÃO DE DESPESAS ---
${d.saidas.slice(0, 5).map(s => `- ${s.c}: ${R(s.v)}`).join('\n')}

--- CONCILIAÇÃO DE RECEBÍVEIS ---
${d.entFP.map(f => `- ${f.fp}: Bruto ${R(f.bruto)} (Líq ${R(f.liq)})`).join('\n')}

Por favor, analise a liquidez da empresa considerando o saldo atual e os compromissos do mês listados acima. Sugira ajustes caso os vencimentos estejam concentrados em datas de baixo fluxo de recebimento.`;

  const textarea = document.createElement('textarea');
  textarea.value = prompt;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  
  notify("Prompt copiado com sucesso!", "success");
}

// ── UI HELPERS ──
function toggleParcelas(id){ document.getElementById(id).classList.toggle('hidden'); }
function setTab(name, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  btn.classList.add('active');
}
function setFilter(name, btn){
  currentFilter=name;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active', 'bg-brand-600', 'text-white'));
  btn.classList.add('active', 'bg-brand-600', 'text-white');
  document.getElementById('customRange').classList.toggle('hidden', name!=='custom');
  if(name!=='custom') renderAll();
}
function applyCustom(){
  customFrom = new Date(document.getElementById('dateFrom').value);
  customTo = new Date(document.getElementById('dateTo').value);
  renderAll();
}
function showLoading(msg){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('loadingScreen').classList.remove('hidden');
  document.getElementById('loadingText').textContent = msg;
}
function showDashboard(){
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('btnRefresh').classList.remove('hidden');
}
async function refreshData(){
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('animate-spin');
  await loadAllData();
  icon.classList.remove('animate-spin');
}

window.onload = () => { lucide.createIcons(); };
loadGIS();
</script>
