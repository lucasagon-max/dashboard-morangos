<body class="text-slate-800">

    <!-- ⚙️ CONFIGURAÇÃO DO SUPABASE -->
    <script>
        const SUPABASE_URL = "https://fepvxdmssoqfktqmbyzn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_d0ESFHQfYGGW3r69IpE6Jg_gKCSvHzG";
        
        let supabaseClient = null;

        function initSupabase(adminKey) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {

    <!-- Login Screen -->

            <div class="flex items-center gap-2">

    <!-- Modal Adicionar/Editar -->

                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Categoria</label>
                                        <select id="pCategory" required class="w-full px-4 py-[11px] rounded-xl border border-slate-200 focus:border-brand-500 focus:outline-none bg-slate-50 font-medium cursor-pointer" onchange="if(this.value==='_new') { const n = prompt('Nome da Nova Categoria:'); if(n && n.trim()){ const opt = document.createElement('option'); opt.value = n.trim(); opt.text = n.trim(); this.add(opt, this.options[1]); this.value = n.trim(); } else { this.value = ''; } }">
                                        </select>
                                    </div>
                                    <div class="flex flex-col justify-end">
                                        <label class="flex items-center cursor-pointer mb-3">

                                                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-400"></div>

                                            </div>

                                        <button type="button" id="togglePriceModeBtn" onclick="togglePriceMode()" class="text-xs text-red-600 font-medium hover:underline">Adicionar variações</button>

                                    <div id="simplePriceContainer">

                                    <div id="variationsContainer" class="hidden space-y-2">

                                        <button type="button" onclick="addVariationRow()" class="mt-2 text-sm flex items-center gap-1 text-slate-600 hover:text-red-600 font-medium transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> Adicionar outra opção</button>

        <div class="flex items-start justify-center min-h-screen pt-4 sm:pt-10 px-4 pb-4 overflow-y-auto">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-xl relative flex flex-col max-h-[90vh]">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl shrink-0">
                    <h3 class="text-lg font-semibold text-slate-800"><i data-lucide="layout" class="inline w-5 h-5 mr-2 -mt-1 text-slate-500"></i>Aparência e Vitrine</h3>
                    <button onclick="closeConfigModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>

                    <div class="flex flex-col sm:flex-row gap-3">
                        <div class="flex-1">

                    </div>

                        <label class="block text-sm font-medium text-slate-700 mb-1">Subtítulo (Abaixo do título)</label>

                    </div>

    <!-- Modal Combos -->
    <div id="comboModal" class="fixed inset-0 z-50 hidden">

                            <div>

                                </div>

                                    <div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-amber-500">R$</span><input type="text" id="cPrecoAtivo" placeholder="0.00" class="w-full pl-9 pr-3 py-2 rounded-lg border-2 border-amber-300 focus:ring-2 focus:ring-amber-500 outline-none font-bold text-amber-800"></div>

    <script>
        let products = [];
        let idToDelete = null;
        let isVariationMode = false;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // fetchProducts agora é chamado apenas após o login
            document.getElementById('searchInput').addEventListener('input', renderProducts);
            document.getElementById('categoryFilter').addEventListener('change', renderProducts);
        });

        async function attemptLogin() {
            console.log("Tentando login...");
            const keyInput = document.getElementById('admin-key-input');
            const key = keyInput.value.trim();
            
            if(!key) {
                alert("Por favor, digite a chave de acesso.");
                return;
            }

            if(!window.supabase) {
                alert("Erro: SDK do Supabase não carregado. Verifique sua conexão.");
                return;
            }

            initSupabase(key);
            showLoader(true);
            
            // Testa a conexão tentando buscar um dado simples
            try {
                const { data, error } = await supabaseClient.from('produtos').select('id').limit(1);
                
                if(error) {
                    console.error("Erro Supabase:", error);
                    alert("Acesso Negado: " + (error.message || "Chave inválida. Verifique se aplicou o SQL no painel."));
                    showLoader(false);
                } else {
                    document.getElementById('login-overlay').classList.add('hidden');
                    fetchProducts();
                }
            } catch (e) {
                alert("Erro de conexão: " + e.message);
                showLoader(false);
            }
        }

        function toggleAdminPass() {
            const input = document.getElementById('admin-key-input');
            const icon = document.getElementById('pass-icon');
            if(input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
        
        document.getElementById('admin-key-input')?.addEventListener('keyup', (e) => { if(e.key === 'Enter') attemptLogin(); });

        function showLoader(show) { document.getElementById('loader').classList.toggle('active', show); }

        function togglePriceMode(forceMode = null) {
            const btn = document.getElementById('togglePriceModeBtn');
            const simpleContainer = document.getElementById('simplePriceContainer');
            const varContainer = document.getElementById('variationsContainer');

            isVariationMode = forceMode !== null ? forceMode : !isVariationMode;

            if (isVariationMode) {
                simpleContainer.classList.add('hidden');
                varContainer.classList.remove('hidden');
                btn.textContent = "Usar preço único";
                if (document.getElementById('variationsList').children.length === 0) addVariationRow();
            } else {
                simpleContainer.classList.remove('hidden');
                varContainer.classList.add('hidden');
                btn.textContent = "Adicionar variações";
            }
        }

        function addVariationRow(label = '', price = '') {
            const list = document.getElementById('variationsList');
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center";
            div.innerHTML = `
                <input type="text" placeholder="Tamanho/Tipo (ex: 500ml)" value="${label}" class="var-label w-2/3 px-3 py-2 rounded-lg border border-slate-300 text-sm focus:border-red-500 outline-none">
                <input type="text" placeholder="R$ Valor" value="${price}" class="var-price w-1/3 px-3 py-2 rounded-lg border border-slate-300 text-sm focus:border-red-500 outline-none">
                <button type="button" onclick="this.parentElement.remove()" class="text-slate-400 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            `;
            list.appendChild(div);
            lucide.createIcons();
        }

        function getPriceValue() {
            if (!isVariationMode) return document.getElementById('pPriceSimple').value.trim();
            let parts = [];
            document.querySelectorAll('#variationsList div.flex').forEach(row => {
                const label = row.querySelector('.var-label').value.trim();
                const price = row.querySelector('.var-price').value.trim();
                if (label && price) parts.push(`${label}:${price}`);
            });
            return parts.join('|');
        }

        // --- INTEGRAÇÃO COM SUPABASE ---
        async function fetchProducts() {
            showLoader(true);
            
            // Verifica a busca no Supabase
            const { data, error } = await supabaseClient
                .from('produtos')
                .select('*')
                .order('nome', { ascending: true });
                
            if (error) {
                console.error(error);
                alert("Erro ao buscar dados do Supabase: " + error.message);
            } else {
                console.log("Produtos encontrados:", data.length);
                products = data || [];
                populateCategories();
                renderProducts();
            }
            showLoader(false);
        }

        function submitForm() {
            document.getElementById('pPriceFinal').value = getPriceValue();
            document.getElementById('productForm').dispatchEvent(new Event('submit'));
        }

        async function handleSave(e) {
            e.preventDefault();
            const editId = document.getElementById('editProductId').value;
            const finalPrice = document.getElementById('pPriceFinal').value;
            if (!finalPrice) return alert("Por favor, insira um preço ou variação.");

            let finalImageUrl = document.getElementById('pImage').value;
            const fileInput = document.getElementById('pImageFile');
            
            // Lógica de Upload pro Supabase
            if (fileInput.files.length > 0) {
                showLoader(true);
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                const filePath = `${fileName}`;

                const { data: uploadData, error: uploadError } = await supabaseClient.storage.from('produtos').upload(filePath, file);
                
                if (uploadError) {
                    alert("Erro no upload da imagem: " + uploadError.message + "\n\nVerifique no Supabase se o Bucket 'produtos' é Público e se as políticas (Policies) de RLS permitem INSERT.");
                    showLoader(false);
                    return;
                }

                const { data: publicUrlData } = supabaseClient.storage.from('produtos').getPublicUrl(filePath);
                finalImageUrl = publicUrlData.publicUrl;
            }

            const payload = {
                nome: document.getElementById('pName').value,
                preco: finalPrice,
                categoria: document.getElementById('pCategory').value || 'Geral',
                imagem: finalImageUrl,
                descricao: document.getElementById('pDesc').value,
                disponivel: document.getElementById('pAvailable').checked ? "Sim" : "Não",
                destaque: document.getElementById('pDestaque').checked ? "Sim" : "Não"
            };

            showLoader(true);
            let error;
            if (editId) {
                const res = await supabaseClient.from('produtos').update(payload).eq('id', editId);
                error = res.error;
            } else {
                const res = await supabaseClient.from('produtos').insert([payload]);
                error = res.error;
            }

            if (error) {
                alert("Erro ao salvar: " + error.message);
            } else { 
                closeModal(); 
                fetchProducts(); 
            }
            showLoader(false);
        }

        function deleteProduct(id) {
            idToDelete = id;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        async function confirmDelete() {
            if(!idToDelete) return;
            const targetId = idToDelete;
            closeDeleteModal();
            showLoader(true);
            const { error } = await supabaseClient.from('produtos').delete().eq('id', targetId);
            if (error) alert("Erro ao excluir: " + error.message);
            else fetchProducts();
            showLoader(false);
        }

        // --- RENDERIZAÇÃO SEGURA ---
        function populateCategories() {
            const categories = [...new Set(products.map(p => p.categoria || 'Geral'))].sort();
            document.getElementById('categoryFilter').innerHTML = '<option value="">Todas as Categorias</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const sel = document.getElementById('pCategory');
            sel.innerHTML = '<option value="" disabled selected>Selecione...</option>' 
                          + categories.map(c => `<option value="${c}">${c}</option>`).join('')
                          + '<option value="_new" class="font-bold text-brand-600">➕ Criar Nova Categoria</option>';
        }

        function renderProducts() {
            const container = document.getElementById('productList');
            const empty = document.getElementById('emptyState');
            const header = document.getElementById('productsHeader');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const catFilter = document.getElementById('categoryFilter').value;

            container.innerHTML = '';
            
            // Filtro com travas de segurança (caso nome ou descricao seja null)
            const filtered = products.filter(p => {
                const nomeSeguro = p.nome ? String(p.nome).toLowerCase() : '';
                const descSegura = p.descricao ? String(p.descricao).toLowerCase() : '';
                const catSegura = p.categoria || 'Geral';
                
                const matchesSearch = nomeSeguro.includes(search) || descSegura.includes(search);
                const matchesCat = catFilter ? catSegura === catFilter : true;
                
                return matchesSearch && matchesCat;
            });

            if (filtered.length === 0) {
                empty.classList.remove('hidden'); 
                header.classList.add('hidden');
                return;
            }
            empty.classList.add('hidden'); 
            header.classList.remove('hidden');

            filtered.forEach(p => {
                const isAv = String(p.disponivel).toLowerCase() === "sim" || p.disponivel === true;
                const catSegura = p.categoria || 'Geral';
                const descSegura = p.descricao || 'Sem descrição';
                let priceDisplay = String(p.preco || '0');
                
                if (priceDisplay.includes('|')) {
                    priceDisplay = priceDisplay.split('|').map(item => {
                        const parts = item.split(':');
                        const label = parts[0] || '';
                        const val = parts[1] || '0';
                        return `<span class="inline-block bg-brand-50 text-brand-700 rounded-md px-2 py-1 text-[10px] font-bold border border-brand-100 shadow-sm">${label}: R$ ${val}</span>`;
                    }).join(' ');
                } else {
                    priceDisplay = `<span class="font-black text-slate-900 text-lg">R$ ${priceDisplay}</span>`;
                }

                const imgHtml = p.imagem ? `<img src="${p.imagem}" class="h-full w-full object-cover group-hover:scale-110 transition-transform duration-300">` : `<div class="h-full w-full flex items-center justify-center text-slate-300 bg-slate-50"><i data-lucide="image" class="w-6 h-6"></i></div>`;
                
                const isDestaque = String(p.destaque).toLowerCase() === "sim" || p.destaque === true;
                const item = document.createElement('div');
                item.className = `group bg-white rounded-3xl border border-slate-200 md:border-0 md:rounded-none p-5 md:px-6 md:py-5 flex flex-col md:grid md:grid-cols-12 gap-5 items-center hover:bg-brand-50/30 transition-all ${!isAv ? 'opacity-50 grayscale' : ''}`;
                
                item.innerHTML = `
                    <div class="col-span-12 md:col-span-6 lg:col-span-5 flex items-center gap-5 w-full">
                        <div class="h-16 w-16 shrink-0 rounded-2xl bg-slate-100 border border-slate-100 overflow-hidden relative shadow-sm">
                            ${imgHtml} 
                            ${!isAv ? '<div class="absolute inset-0 bg-slate-900/40 flex items-center justify-center"><span class="text-[8px] font-black text-white uppercase tracking-tighter">Indisponível</span></div>' : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-black text-slate-900 text-base truncate font-serif flex items-center gap-2">${p.nome} ${isDestaque ? '<span title="Em Destaque" class="text-amber-400"><i data-lucide="star" class="w-4 h-4 fill-amber-400"></i></span>' : ''}</h4>
                            <p class="text-xs text-slate-500 truncate hidden md:block mt-0.5 font-medium">${descSegura}</p>
                            <span class="md:hidden inline-block px-3 py-1 mt-2 rounded-full text-[10px] font-bold bg-white text-brand-600 border border-brand-100 shadow-sm uppercase tracking-wider">${catSegura}</span>
                        </div>
                    </div>
                    <div class="hidden md:block col-span-3 lg:col-span-2 text-sm">
                        <span class="px-3 py-1.5 rounded-full text-[10px] font-black bg-white text-slate-600 border border-slate-100 shadow-sm uppercase tracking-widest">${catSegura}</span>
                    </div>
                    <div class="col-span-12 md:col-span-3 lg:col-span-3 text-sm w-full md:w-auto">
                        <div class="flex flex-wrap items-center gap-2">${priceDisplay}</div>
                    </div>
                    <div class="col-span-12 md:col-span-2 flex justify-end gap-3 w-full md:w-auto border-t md:border-t-0 pt-4 md:pt-0 border-slate-100 mt-1 md:mt-0">
                         <div class="flex items-center gap-2.5">
                            <button onclick='openEditModal(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="p-2.5 text-slate-400 hover:text-brand-600 hover:bg-brand-50 rounded-xl transition-all shadow-sm border border-slate-100 bg-white"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteProduct('${p.id}')" class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all shadow-sm border border-slate-100 bg-white"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                         </div>
                    </div>`;
                container.appendChild(item);
            });
            lucide.createIcons();
        }

        function openModal() {
            document.getElementById('productForm').reset();
            document.getElementById('editProductId').value = "";
            document.getElementById('modalTitle').textContent = "Novo Produto";
            document.getElementById('pImageFile').value = "";
            updateImagePreview("");
            document.getElementById('pAvailable').checked = true;
            document.getElementById('pDestaque').checked = false;
            document.getElementById('variationsList').innerHTML = '';
            togglePriceMode(false);
            document.getElementById('productModal').classList.remove('hidden');
        }

        function openEditModal(product) {
            document.getElementById('modalTitle').textContent = "Editar Produto";
            document.getElementById('editProductId').value = product.id;
            document.getElementById('pName').value = product.nome || '';
            const catSelect = document.getElementById('pCategory');
            const catVal = product.categoria || 'Geral';
            if(![...catSelect.options].some(o => o.value === catVal)) {
                const opt = document.createElement('option'); opt.value = catVal; opt.text = catVal;
                catSelect.add(opt, catSelect.options[1]);
            }
            catSelect.value = catVal;
            document.getElementById('pImageFile').value = "";
            document.getElementById('pImage').value = product.imagem || '';
            document.getElementById('pDesc').value = product.descricao || '';
            document.getElementById('pAvailable').checked = (String(product.disponivel).toLowerCase() === "sim" || product.disponivel === true);
            document.getElementById('pDestaque').checked = (String(product.destaque).toLowerCase() === "sim" || product.destaque === true);
            updateImagePreview(product.imagem);
            
            document.getElementById('variationsList').innerHTML = '';
            const price = String(product.preco || '0');
            if (price.includes('|') || price.includes(':')) {
                togglePriceMode(true);
                price.split('|').forEach(part => {
                    const parts = part.split(':');
                    addVariationRow(parts[0] || '', parts[1] || '0');
                });
            } else {
                togglePriceMode(false);
                document.getElementById('pPriceSimple').value = price;
            }
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('productModal').classList.add('hidden'); }
        function closeDeleteModal() { document.getElementById('deleteModal').classList.add('hidden'); idToDelete = null; }
        function handleImageFileSelected(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    updateImagePreview(e.target.result);
                };
                reader.readAsDataURL(file);
                document.getElementById('pImage').value = ''; 
            }
        }

        function updateImagePreview(url) {
            const img = document.getElementById('imagePreview');
            const ph = document.getElementById('imagePlaceholder');
            const ov = document.getElementById('imageOverlay');
            if(url) { img.src = url; img.classList.remove('hidden'); ph.classList.add('hidden'); if(ov) ov.classList.remove('hidden'); } 
            else { img.classList.add('hidden'); ph.classList.remove('hidden'); if(ov) ov.classList.add('hidden'); }
        }
        // --- VITRINE / CONFIGURAÇÕES ---
        async function openConfigModal() {
            showLoader(true);
            const { data, error } = await supabaseClient.from('loja_config').select('*').eq('id', 1).single();
            showLoader(false);
            
            const parts = (data?.titulo || "").split("|||");
            document.getElementById('cfgTitulo1').value = parts[0] || '';
            document.getElementById('cfgTitulo2').value = parts[1] || '';
            
            document.getElementById('cfgSubtitulo').value = data?.subtitulo || '';
            document.getElementById('cfgCarouselList').innerHTML = '';
            
            let imgs = data?.imagens || [];
            if(typeof imgs === 'string') { try{ imgs = JSON.parse(imgs); }catch(e){ imgs=[]; } }
            if(!Array.isArray(imgs)) imgs = [];
            
            if(imgs.length === 0) addCarouselItem();
            else imgs.forEach(img => addCarouselItem(img.url, img.produto_id, img.texto));
            
            document.getElementById('configModal').classList.remove('hidden');
        }

        function closeConfigModal() { document.getElementById('configModal').classList.add('hidden'); }

        function addCarouselItem(url = '', pid = '', texto = '') {
            const list = document.getElementById('cfgCarouselList');
            const div = document.createElement('div');
            div.className = "flex flex-col gap-2 items-start justify-center p-4 border border-slate-100 bg-white rounded-lg shadow-sm relative group";
            
            let options = '<option value="">(Nenhum link. Só mostrar foto)</option>';
            products.forEach(p => {
                options += `<option value="${p.id}" ${p.id == pid ? 'selected' : ''}>${p.nome}</option>`;
            });

            div.innerHTML = `
                <div class="flex flex-col sm:flex-row gap-2 w-full">
                    <div class="w-full sm:w-1/2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Imagem (URL/Upload)</label>
                        <div class="flex gap-2">
                            <input type="file" accept="image/*" class="hidden file-cfg" onchange="handleCfgUpload(this)">
                            <button type="button" onclick="this.previousElementSibling.click()" class="bg-slate-100 p-2 rounded border border-slate-200 text-brand-600 hover:bg-brand-50"><i data-lucide="upload-cloud" class="w-4 h-4"></i></button>
                            <input type="text" placeholder="URL direta" value="${url}" class="url-cfg flex-1 border border-slate-200 rounded px-2 py-1 text-sm outline-none w-full">
                        </div>
                    </div>
                    <div class="w-full sm:w-1/2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ação / Atalho de Link</label>
                        <select class="prod-cfg w-full border border-slate-200 rounded px-2 py-[7px] text-sm outline-none bg-slate-50">${options}</select>
                    </div>
                </div>
                <div class="w-full">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Texto Sobre a Imagem (Opcional)</label>
                    <input type="text" placeholder="Ex: Promoção - 1kg de Morango por R$20" value="${texto || ''}" class="txt-cfg w-full border border-slate-200 rounded px-2 py-1.5 text-sm outline-none bg-slate-50 focus:bg-white focus:border-brand-300">
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full p-1 border border-red-200 opacity-0 group-hover:opacity-100 transition-opacity drop-shadow-sm"><i data-lucide="x" class="w-3 h-3"></i></button>
            `;
            list.appendChild(div);
            lucide.createIcons();
        }

        async function handleCfgUpload(inputEl) {
            if(!inputEl.files.length) return;
            const file = inputEl.files[0];
            showLoader(true);
            const fileName = `capa_${Date.now()}_${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;
            const { error: uploadError } = await supabaseClient.storage.from('produtos').upload(fileName, file);
            if(uploadError) { alert("Erro da imagem: Certifique-se que o usuário tem permissão ou SQL foi rodado."); showLoader(false); return; }
            
            const { data: publicUrlData } = supabaseClient.storage.from('produtos').getPublicUrl(fileName);
            inputEl.parentElement.querySelector('.url-cfg').value = publicUrlData.publicUrl;
            showLoader(false);
        }

        async function saveConfig() {
            const tit1 = document.getElementById('cfgTitulo1').value.trim();
            const tit2 = document.getElementById('cfgTitulo2').value.trim();
            const titulo = tit1 + "|||" + tit2;
            const subtitulo = document.getElementById('cfgSubtitulo').value;
            const imgs = [];
            
            document.querySelectorAll('#cfgCarouselList > div').forEach(row => {
                const url = row.querySelector('.url-cfg').value.trim();
                const pid = row.querySelector('.prod-cfg').value;
                const txt = row.querySelector('.txt-cfg').value.trim();
                if(url) imgs.push({ url: url, produto_id: pid, texto: txt });
            });

            const payload = { id: 1, titulo: titulo, subtitulo: subtitulo, imagens: imgs };

            showLoader(true);
            const { error } = await supabaseClient.from('loja_config').upsert(payload, {onConflict: 'id'});
            showLoader(false);
            if(error) alert("Erro ao salvar vitrine: " + error.message);
            else closeConfigModal();
        }

        // --- COMBOS / KITS ---
        function openComboModal() {
            document.getElementById('cNome').value = '';
            document.getElementById('cPrecoAtivo').value = '';
            document.getElementById('cTotalOriginal').value = '0.00';
            document.getElementById('cImageFile').value = '';
            document.getElementById('cImagePreview').classList.add('hidden');
            document.getElementById('cImagePlaceholder').classList.remove('hidden');
            
            const list = document.getElementById('comboProductsChecklist');
            list.innerHTML = '';
            
            products.filter(p => p.disponivel !== "Não").forEach(p => {
                const priceMatch = p.preco.match(/(\d+[\.,]\d*)/); 
                const price = priceMatch ? parseFloat(priceMatch[0].replace(',','.')) : 0;
                list.innerHTML += `
                    <label class="flex items-center gap-3 p-2 hover:bg-slate-50 cursor-pointer rounded">
                        <input type="checkbox" class="combo-checkbox w-4 h-4 text-amber-600 focus:ring-amber-500 rounded border-slate-300" data-name="${p.nome}" data-price="${price}">
                        <span class="text-slate-700 flex-1 truncate font-medium">${p.nome}</span>
                        <span class="text-slate-400 font-mono text-xs">R$ ${price.toFixed(2)}</span>
                    </label>
                `;
            });
            list.querySelectorAll('.combo-checkbox').forEach(cb => cb.addEventListener('change', calcComboTotal));
            document.getElementById('comboModal').classList.remove('hidden');
        }

        function calcComboTotal() {
            let total = 0;
            document.querySelectorAll('.combo-checkbox:checked').forEach(cb => { total += parseFloat(cb.dataset.price || 0); });
            document.getElementById('cTotalOriginal').value = total.toFixed(2);
        }

        function closeComboModal() { document.getElementById('comboModal').classList.add('hidden'); }

        function handleComboImageFile(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('cImagePreview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('cImagePlaceholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        async function saveCombo() {
            const nome = document.getElementById('cNome').value.trim();
            const precoStr = document.getElementById('cPrecoAtivo').value.trim();
            if(!nome || !precoStr) return alert("Preencha o nome e o preço do Combo.");
            const precoNum = parseFloat(precoStr.replace(',', '.'));
            if(isNaN(precoNum)) return alert("Preço inválido.");
            
            let itensInclusos = [];
            document.querySelectorAll('.combo-checkbox:checked').forEach(cb => itensInclusos.push(cb.dataset.name));
            if(itensInclusos.length === 0) return alert("Selecione pelo menos um produto para o Combo.");

            const totalOrig = parseFloat(document.getElementById('cTotalOriginal').value);
            const desc = `Combo Especial contendo:\n✅ ${itensInclusos.join('\n✅ ')}\n\nDe R$ ${totalOrig.toFixed(2)} por apenas R$ ${precoNum.toFixed(2)}!`;

            let finalUrl = "";
            const fileInput = document.getElementById('cImageFile');
            if (fileInput.files.length > 0) {
                showLoader(true);
                const file = fileInput.files[0];
                const fn = `combo_${Date.now()}_${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;
                const { error: uploadError } = await supabaseClient.storage.from('produtos').upload(fn, file);
                if (uploadError) { alert("Erro de Upload: " + uploadError.message); showLoader(false); return; }
                const { data } = supabaseClient.storage.from('produtos').getPublicUrl(fn);
                finalUrl = data.publicUrl;
                showLoader(false);
            }

            const payload = {
                nome: nome,
                preco: precoNum.toFixed(2),
                categoria: 'Combos & Promos', // Fixa pra destacar em aba separada
                imagem: finalUrl,
                descricao: desc,
                disponivel: "Sim",
                destaque: "Sim" 
            };

            showLoader(true);
            const { error } = await supabaseClient.from('produtos').insert([payload]);
            if (error) alert("Erro ao criar Combo: " + error.message);
            else { closeComboModal(); fetchProducts(); }
            showLoader(false);
        }
    </script>
</body>
