            <div id="cart-items-mobile" class="flex-1 overflow-y-auto px-8 space-y-4 py-4 min-h-[200px]"></div>

    <!-- ── SCRIPTS DE LÓGICA ── -->
    <script>
        const CATEGORY_ORDER = ["Sucos Especiais","Salgados","Smoothies","Milk Shakes","Promoções","Sucos Frescos","Bebidas Geladas","Cafés","Cafés Especiais","Chás Gelados","Sobremesas","Doces","Morangos Frescos","Frutas Congeladas","Artesanatos"];
        const SPECIAL_CATEGORIES = ["Morangos Frescos", "Frutas Congeladas", "Artesanatos"];

        let allProducts = [], addonsList = [], cart = [], currentCategory = 'Todos', searchQuery = '', currentItem = null;

        async function init() {
            try {
                const { data: rawData, error } = await supabaseClient.from('produtos').select('*');
                if (error) throw error;

                if (rawData && rawData.length > 0) {
                    addonsList = []; allProducts = [];
                    rawData.forEach((item, index) => {
                        if (!(item.nome || '').trim()) return;
                        const statusRaw = String(item.disponivel || 'sim').toLowerCase().trim();
                        if (['não', 'nao', 'off', 'false', '0', 'n'].includes(statusRaw)) return;

                        const obj = { Nome:item.nome, Categoria:item.categoria||'Geral', Preco:item.preco||'0', Descricao:item.descricao||'', originalIndex:index };
                        const catLower = (item.categoria || 'Geral').trim().toLowerCase();
                        
                        if (catLower.startsWith('adicionais')) {
                            let targets = ['all'];
                            if (item.categoria.includes(':')) targets = item.categoria.split(':')[1].split(',').map(x => x.trim().toLowerCase());
                            addonsList.push({ ...obj, targetCategories: targets });
                        } else {
                            allProducts.push(obj);
                        }
                    });
                    renderCategories();
                    renderProducts();
                }
            } catch (e) {
                console.error(e);
                document.getElementById('product-list').innerHTML = '<p class="p-10 text-center text-red-500 font-bold">Erro ao carregar cardápio!</p>';
            }
        }

        function renderCategories() {
            const cats = ['Todos', ...new Set(allProducts.map(p => p.Categoria ? p.Categoria.trim() : 'Geral'))]
                .sort((a,b) => (CATEGORY_ORDER.indexOf(a) === -1 ? 99 : CATEGORY_ORDER.indexOf(a)) - (CATEGORY_ORDER.indexOf(b) === -1 ? 99 : CATEGORY_ORDER.indexOf(b)));
            
            const htmlMobile = cats.map(c => `<button onclick="setCategory('${c}')" class="category-chip shrink-0 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-slate-100 bg-white shadow-sm transition-all ${currentCategory === c ? 'active' : 'text-slate-400'}">${c}</button>`).join('');
            const htmlSidebar = cats.map(c => `<button onclick="setCategory('${c}')" class="flex items-center justify-between px-4 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest text-left transition-all group ${currentCategory === c ? 'bg-brand-50 text-brand-600 border border-brand-100' : 'text-slate-400 hover:bg-slate-50'}"><span>${c}</span><i data-lucide="chevron-right" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity"></i></button>`).join('');
            
            document.getElementById('category-mobile').innerHTML = htmlMobile;
            document.getElementById('category-sidebar').innerHTML = htmlSidebar;
            lucide.createIcons();
        }

        function renderProducts() {
            const list = document.getElementById('product-list');
            const filtered = allProducts.filter(p => {
                if (searchQuery) return p.Nome.toLowerCase().includes(searchQuery.toLowerCase());
                return currentCategory === 'Todos' || p.Categoria === currentCategory;
            });

            if (filtered.length === 0) return list.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-bold uppercase text-xs">Nenhum item encontrado</div>`;

            list.innerHTML = filtered.map(p => {
                const hasVariations = p.Preco.toString().includes('|');
                const catLower = (p.Categoria || '').toLowerCase();
                const hasAddons = addonsList.some(a => a.targetCategories.includes('all') || a.targetCategories.some(t => catLower.includes(t)));
                const needsModal = hasVariations || hasAddons;
                const displayPrice = hasVariations ? p.Preco.split('|')[0].split(':')[1] || p.Preco.split('|')[0].split(':')[0] : p.Preco;

                return `
                    <div class="product-card bg-white p-6 rounded-[2rem] border border-slate-100 flex flex-col justify-between gap-4 shadow-sm hover:shadow-xl hover:shadow-slate-200/50">
                        <div class="flex-grow cursor-pointer" onclick="${needsModal ? `openModal(${p.originalIndex})` : `quickAdd(${p.originalIndex})`}">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[8px] font-black text-brand-600 uppercase bg-brand-50 px-2 py-1 rounded-md tracking-widest">${p.Categoria}</span>
                            </div>
                            <h4 class="font-black text-slate-800 text-md leading-tight mb-1">${p.Nome}</h4>
                            <p class="text-[10px] text-slate-400 leading-relaxed line-clamp-2">${p.Descricao || ''}</p>
                        </div>
                        <div class="flex items-center justify-between mt-2 pt-4 border-t border-slate-50">
                            <span class="font-black text-slate-900">${formatMoney(displayPrice)}</span>
                            <button onclick="${needsModal ? `openModal(${p.originalIndex})` : `quickAdd(${p.originalIndex})`}" class="w-10 h-10 bg-slate-900 text-white rounded-2xl flex items-center justify-center active:bg-brand-600 transition-all">
                                <i data-lucide="${needsModal ? 'plus' : 'shopping-bag'}" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function quickAdd(index) {
            const p = allProducts.find(x => x.originalIndex === index);
            if(!p) return;
            addItemToCart({ ...p, finalPrice: parsePrice(p.Preco), addons: [], obs: '', sizeLabel: '', quantity: 1 });
            Toastify({ text: "Adicionado ao Carrinho! 🍓", duration: 1000, gravity: "bottom", style: { background: "#e11d48", borderRadius: "1rem", fontWeight: "900", marginBottom: "30px" } }).showToast();
        }

        function openModal(index) {
            const p = allProducts.find(x => x.originalIndex === index);
            if(!p) return;
            currentItem = { ...p, selectedAddons: [], basePrice: 0, selectedSize: null, quantity: 1 };
            document.getElementById('modal-title').innerText = p.Nome;
            document.getElementById('modal-desc').innerText = p.Descricao || 'Produto especial da casa Morangos Tatuí.';
            document.getElementById('item-obs').value = '';
            document.getElementById('modal-qty-display').innerText = '1';

            const rawPrice = String(p.Preco);
            const sizesDiv = document.getElementById('sizes-container');
            if (rawPrice.includes('|')) {
                sizesDiv.classList.remove('hidden');
                const sizes = rawPrice.split('|').map(s => {
                   const parts = s.split(':');
                   return { label: parts[0].trim(), price: parsePrice(parts[1] || parts[0]) };
                });
                currentItem.sizes = sizes;
                document.getElementById('sizes-list').innerHTML = sizes.map((s, i) => `
                    <label class="cursor-pointer">
                        <input type="radio" name="size_opt" class="peer sr-only" value="${i}" ${i===0?'checked':''} onchange="selectSize(${i})">
                        <div class="peer-checked:bg-slate-900 peer-checked:text-white peer-checked:border-slate-900 border border-slate-100 rounded-2xl p-4 text-center transition-all bg-slate-50 text-slate-400 group">
                            <div class="font-black text-xs uppercase tracking-widest">${s.label}</div>
                            <div class="text-[10px] font-bold mt-1">${formatMoney(s.price)}</div>
                        </div>
                    </label>
                `).join('');
                selectSize(0);
            } else {
                sizesDiv.classList.add('hidden');
                currentItem.basePrice = parsePrice(rawPrice);
                updateModalTotal();
            }

            const catItem = (p.Categoria || '').toLowerCase();
            const compatible = addonsList.filter(a => a.targetCategories.includes('all') || a.targetCategories.some(t => catItem.includes(t)));
            const addonsDiv = document.getElementById('addons-container');
            if(compatible.length > 0) {
                addonsDiv.classList.remove('hidden');
                document.getElementById('addons-list').innerHTML = compatible.map(ad => `
                    <label class="flex justify-between items-center px-4 py-3 border border-slate-50 rounded-2xl bg-white group cursor-pointer hover:bg-slate-50 transition-all">
                        <div class="flex flex-col">
                            <span class="text-xs font-black text-slate-700 uppercase tracking-tight">${ad.Nome}</span>
                            <span class="text-[9px] font-black text-emerald-500">+${formatMoney(ad.Preco)}</span>
                        </div>
                        <input type="checkbox" onchange="toggleAddon('${ad.Nome.replace(/'/g, "\\'")}', ${ad.Preco}, this.checked)" class="w-6 h-6 border-slate-200 rounded-lg text-brand-600 focus:ring-brand-500">
                    </label>
                `).join('');
            } else { addonsDiv.classList.add('hidden'); }
            document.getElementById('options-modal').classList.remove('hidden');
        }

        const formatMoney = v => (typeof v === 'string' ? parsePrice(v) : v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const parsePrice = v => {
            if(!v) return 0;
            let s = String(v).replace('R$', '').trim();
            return parseFloat(s.includes(',') ? s.replace(/\./g, '').replace(',', '.') : s) || 0;
        };

        window.selectSize = i => { if(currentItem?.sizes) { currentItem.basePrice = currentItem.sizes[i].price; currentItem.selectedSize = currentItem.sizes[i].label; updateModalTotal(); } };
        window.toggleAddon = (n, p, c) => { if(c) currentItem.selectedAddons.push({ Nome: n, Preco: p }); else currentItem.selectedAddons = currentItem.selectedAddons.filter(a => a.Nome !== n); updateModalTotal(); };
        window.adjustModalQty = d => { const n = currentItem.quantity + d; if(n >= 1) { currentItem.quantity = n; document.getElementById('modal-qty-display').innerText = n; updateModalTotal(); } };

        function updateModalTotal() {
            const unit = currentItem.basePrice + currentItem.selectedAddons.reduce((a, b) => a + parseFloat(b.Preco), 0);
            document.getElementById('modal-price-calc').innerText = `${currentItem.quantity}x ${formatMoney(unit)}`;
            document.getElementById('modal-final-total').innerText = formatMoney(unit * currentItem.quantity);
        }

        function confirmAddItem() {
            const unit = currentItem.basePrice + currentItem.selectedAddons.reduce((a, b) => a + parseFloat(b.Preco), 0);
            addItemToCart({ ...currentItem, finalPrice: unit, addons: [...currentItem.selectedAddons], obs: document.getElementById('item-obs').value.trim(), sizeLabel: currentItem.selectedSize });
            closeOptionsModal();
            Toastify({ text: "Adicionado! 🍓", duration: 1500, style: { background: "#e11d48", fontWeight: "900" } }).showToast();
        }

        function addItemToCart(item) {
            const uid = `${item.Nome}-${item.sizeLabel}-${item.addons.map(a=>a.Nome).sort().join('')}-${item.obs}`;
            const ex = cart.find(x => x.uid === uid);
            if(ex) ex.quantity += item.quantity;
            else cart.push({ uid, Nome:item.Nome, quantity:item.quantity, unitPrice:item.finalPrice, sizeLabel:item.sizeLabel, addons:item.addons, obs:item.obs });
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((a, i) => a + (i.unitPrice * i.quantity), 0);
            const count = cart.reduce((a, i) => a + i.quantity, 0);

            ['desktop', 'mobile'].forEach(view => {
                document.getElementById(`cart-total-${view}`).innerText = formatMoney(total);
                const list = document.getElementById(`cart-items-${view}`);
                if(cart.length === 0) list.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300 opacity-50"><i data-lucide="shopping-bag" class="w-10 h-10 mb-4"></i><p class="text-[10px] font-black uppercase tracking-[0.2em]">Vazio</p></div>`;
                else list.innerHTML = cart.map(i => `
                    <div class="bg-white p-5 rounded-3xl border border-slate-50 shadow-sm">
                        <div class="flex justify-between gap-2">
                           <div class="flex-1">
                               <h4 class="font-black text-slate-800 text-xs">${i.quantity}x ${i.Nome} ${i.sizeLabel ? `<span class="text-[9px] bg-slate-100 px-1 rounded ml-1 font-bold">${i.sizeLabel}</span>` : ''}</h4>
                               ${i.addons.length ? `<p class="text-[9px] text-slate-400 mt-1 font-bold uppercase transition-all tracking-tighter opacity-75">+ ${i.addons.map(a=>a.Nome).join(', ')}</p>` : ''}
                               ${i.obs ? `<p class="text-[9px] text-brand-600 bg-brand-50 px-2 py-0.5 rounded-md mt-2 inline-block font-black italic">"${i.obs}"</p>` : ''}
                           </div>
                           <span class="font-black text-slate-900 text-xs">${formatMoney(i.unitPrice * i.quantity)}</span>
                        </div>
                        <div class="flex justify-end mt-4 gap-2 pt-3 border-t border-slate-50/50">
                           <button onclick="changeQty('${i.uid.replace(/'/g, "\\'")}', -1)" class="w-7 h-7 bg-slate-50 text-slate-300 rounded-lg flex items-center justify-center hover:bg-slate-100 transition-all">-</button>
                           <button onclick="changeQty('${i.uid.replace(/'/g, "\\'")}', 1)" class="w-7 h-7 bg-brand-50 text-brand-600 rounded-lg flex items-center justify-center hover:bg-brand-100 transition-all font-bold">+</button>
                        </div>
                    </div>
                `).join('');
            });
            const badge = document.getElementById('mobile-cart-badge');
            badge.innerText = count; badge.classList.toggle('hidden', count === 0);
            lucide.createIcons();
        }

        window.changeQty = (uid, d) => {
            const idx = cart.findIndex(x => x.uid === uid);
            if(idx === -1) return;
            cart[idx].quantity += d;
            if(cart[idx].quantity <= 0) cart.splice(idx, 1);
            updateCartUI();
        };

        async function sendOrder(view) {
            const table = document.getElementById(`table-select-${view}`).value;
            if(!table) return alert("📢 Selecione a MESA para enviar!");
            if(cart.length === 0) return alert("🛒 Adicione produtos antes!");

            const btn = document.getElementById(`btn-send-${view}`);
            const original = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> ENVIANDO...`;
            btn.disabled = true;

            const client = document.getElementById(`client-name-${view}`).value.trim();
            const itemsFormatted = cart.map(i => `${i.quantity}x ${i.Nome}${i.sizeLabel ? ` (${i.sizeLabel})` : ''}${i.addons.length ? ` (+${i.addons.map(a => a.Nome).join(', ')})` : ''}${i.obs ? ` [Obs: ${i.obs}]` : ''} [${formatMoney(i.unitPrice * i.quantity)}]`).join(' | ');

            const payload = {
                id: new Date().getTime().toString().slice(-6),
                data: new Date().toLocaleString("pt-BR"),
                cliente: client ? `${client} (Mesa ${table})` : `Mesa ${table}`,
                tipo: `Mesa ${table}`,
                itens: itemsFormatted,
                total: formatMoney(cart.reduce((a, i) => a + (i.unitPrice * i.quantity), 0)),
                status: 'Novo', pagamento: 'A Pagar no Caixa', obs: 'Atendimento Garçom'
            };

            try {
                const { error } = await supabaseClient.from('pedidos').insert([payload]);
                if (error) throw error;
                Toastify({ text: "Pedido Enviado p/ Cozinha! 🍓🚀", duration: 3000, style: { background: "#16a34a" } }).showToast();
                cart = []; updateCartUI(); closeCart();
                document.getElementById(`table-select-${view}`).value = '';
                document.getElementById(`client-name-${view}`).value = '';
            } catch (e) {
                alert("Erro ao enviar. Verifique sua rede.");
                console.error(e);
            } finally {
                btn.innerHTML = original; btn.disabled = false;
                lucide.createIcons();
            }
        }

        function setCategory(c) { currentCategory = c; renderCategories(); renderProducts(); }
        document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; renderProducts(); });
        function openCart() { document.getElementById('cart-modal-mobile').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cart-modal-mobile').classList.add('hidden'); }
        function closeOptionsModal() { document.getElementById('options-modal').classList.add('hidden'); }
        function clearCart() { if(confirm('Esvaziar carrinho?')) { cart = []; updateCartUI(); if(window.innerWidth < 1024) closeCart(); } }

        init();
        lucide.createIcons();
    </script>
</body>
</html>
